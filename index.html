<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0F172A">
<meta name="apple-mobile-web-app-title" content="Life Planner">
<title>Life Planner</title>
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
:root{
--bg:#FAF3E0;--bg2:#f5edd5;--card:rgba(255,255,255,0.72);--card-border:rgba(15,23,42,0.08);
--text:#0F172A;--text2:#475569;--text3:#94A3B8;
--navy:#0F172A;--sage:#84A98C;--gold:#D4A373;--cream:#FAF3E0;--coral:#E07856;
--accent:#84A98C;--accent2:#D4A373;--danger:#E07856;
--shadow:0 4px 24px rgba(15,23,42,0.06);--shadow-lg:0 8px 40px rgba(15,23,42,0.1);
--radius:16px;--radius-sm:10px;--radius-xs:6px;
--sidebar:260px;--bottombar:72px;
--font:'Inter',system-ui,-apple-system,sans-serif;
}
.dark{
--bg:#0c1220;--bg2:#111827;--card:rgba(30,41,59,0.72);--card-border:rgba(255,255,255,0.06);
--text:#E2E8F0;--text2:#94A3B8;--text3:#64748B;
--shadow:0 4px 24px rgba(0,0,0,0.3);--shadow-lg:0 8px 40px rgba(0,0,0,0.4);
}
*{margin:0;padding:0;box-sizing:border-box;}
html{font-size:16px;}
body{font-family:var(--font);background:var(--bg);color:var(--text);line-height:1.6;min-height:100vh;overflow-x:hidden;transition:background .3s,color .3s;}
::selection{background:var(--sage);color:#fff;}
::-webkit-scrollbar{width:6px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--text3);border-radius:3px;}

/* Layout */
.app{display:flex;min-height:100vh;}
.sidebar{position:fixed;left:0;top:0;bottom:0;width:var(--sidebar);background:var(--navy);color:#E2E8F0;padding:24px 0;display:flex;flex-direction:column;z-index:100;transition:transform .3s;}
.sidebar .logo{padding:0 24px;margin-bottom:32px;}
.sidebar .logo h1{font-size:1.25rem;font-weight:800;letter-spacing:-0.02em;color:#fff;}
.sidebar .logo p{font-size:.75rem;color:#64748B;margin-top:2px;}
.sidebar nav{flex:1;overflow-y:auto;}
.sidebar nav a{display:flex;align-items:center;gap:12px;padding:10px 24px;color:#94A3B8;text-decoration:none;font-size:.875rem;font-weight:500;transition:all .2s;border-left:3px solid transparent;}
.sidebar nav a:hover{color:#E2E8F0;background:rgba(255,255,255,0.05);}
.sidebar nav a.active{color:#fff;background:rgba(132,169,140,0.15);border-left-color:var(--sage);}
.sidebar nav a svg{width:20px;height:20px;flex-shrink:0;}
.main{margin-left:var(--sidebar);flex:1;padding:32px;max-width:1100px;min-height:100vh;}
.bottombar{display:none;position:fixed;bottom:0;left:0;right:0;height:var(--bottombar);background:var(--navy);z-index:100;padding:0 8px;overflow-x:auto;}
.bottombar-inner{display:flex;align-items:center;justify-content:space-around;height:100%;min-width:100%;}
.bottombar a{display:flex;flex-direction:column;align-items:center;gap:2px;color:#64748B;text-decoration:none;font-size:.6rem;font-weight:500;padding:8px 6px;transition:color .2s;white-space:nowrap;}
.bottombar a.active{color:var(--sage);}
.bottombar a svg{width:22px;height:22px;}

@media(max-width:768px){
.sidebar{transform:translateX(-100%);}
.main{margin-left:0;padding:20px 16px;padding-bottom:calc(var(--bottombar) + 24px);}
.bottombar{display:block;}
}

/* Cards */
.card{background:var(--card);backdrop-filter:blur(12px);border:1px solid var(--card-border);border-radius:var(--radius);padding:24px;box-shadow:var(--shadow);transition:transform .2s,box-shadow .2s;}
.card:hover{box-shadow:var(--shadow-lg);}
.card-sm{padding:16px;border-radius:var(--radius-sm);}
.card-title{font-size:1rem;font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:8px;}

/* Grid */
.grid{display:grid;gap:20px;}
.grid-2{grid-template-columns:repeat(2,1fr);}
.grid-3{grid-template-columns:repeat(3,1fr);}
.grid-4{grid-template-columns:repeat(4,1fr);}
@media(max-width:768px){.grid-2,.grid-3,.grid-4{grid-template-columns:1fr;}}
@media(min-width:769px) and (max-width:1024px){.grid-3,.grid-4{grid-template-columns:repeat(2,1fr);}}

/* Typography */
.page-title{font-size:1.75rem;font-weight:800;letter-spacing:-0.03em;margin-bottom:4px;}
.page-sub{color:var(--text2);font-size:.9rem;margin-bottom:24px;}
.section-title{font-size:1.1rem;font-weight:700;margin:28px 0 12px;letter-spacing:-0.01em;}
.label{font-size:.75rem;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:0.04em;margin-bottom:6px;}

/* Inputs */
input,textarea,select{font-family:var(--font);font-size:.875rem;padding:10px 14px;border:1.5px solid var(--card-border);border-radius:var(--radius-xs);background:var(--bg);color:var(--text);width:100%;transition:border-color .2s,box-shadow .2s;outline:none;}
input:focus,textarea:focus,select:focus{border-color:var(--sage);box-shadow:0 0 0 3px rgba(132,169,140,0.15);}
textarea{resize:vertical;min-height:80px;}
select{cursor:pointer;}

/* Buttons */
.btn{display:inline-flex;align-items:center;gap:8px;padding:10px 20px;border:none;border-radius:var(--radius-xs);font-family:var(--font);font-size:.875rem;font-weight:600;cursor:pointer;transition:all .2s;text-decoration:none;}
.btn-primary{background:var(--sage);color:#fff;}
.btn-primary:hover{background:#6b9474;transform:translateY(-1px);}
.btn-secondary{background:var(--bg2);color:var(--text);border:1.5px solid var(--card-border);}
.btn-secondary:hover{border-color:var(--sage);}
.btn-danger{background:var(--coral);color:#fff;}
.btn-danger:hover{background:#c4623f;}
.btn-sm{padding:6px 14px;font-size:.8rem;}
.btn-ghost{background:transparent;color:var(--text2);padding:6px 10px;}
.btn-ghost:hover{color:var(--text);background:var(--bg2);}

/* Tags */
.tag{display:inline-block;padding:3px 10px;border-radius:20px;font-size:.7rem;font-weight:600;}
.tag-sage{background:rgba(132,169,140,0.15);color:var(--sage);}
.tag-gold{background:rgba(212,163,115,0.15);color:var(--gold);}
.tag-coral{background:rgba(224,120,86,0.15);color:var(--coral);}
.tag-navy{background:rgba(15,23,42,0.1);color:var(--navy);}
.dark .tag-navy{background:rgba(255,255,255,0.1);color:var(--text2);}

/* Modal */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);backdrop-filter:blur(4px);z-index:1000;align-items:center;justify-content:center;padding:20px;}
.modal-overlay.open{display:flex;}
.modal{background:var(--bg);border-radius:var(--radius);padding:28px;width:100%;max-width:520px;max-height:85vh;overflow-y:auto;box-shadow:var(--shadow-lg);animation:modalIn .25s ease;}
@keyframes modalIn{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
.modal h2{font-size:1.2rem;font-weight:700;margin-bottom:16px;}
.modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:20px;}

/* Misc */
.stat-num{font-size:1.75rem;font-weight:800;letter-spacing:-0.03em;line-height:1.1;}
.stat-label{font-size:.7rem;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.04em;margin-top:4px;}
.empty{text-align:center;color:var(--text3);padding:32px;font-size:.9rem;line-height:1.7;}
.progress-bar{height:8px;background:var(--bg2);border-radius:4px;overflow:hidden;}
.progress-fill{height:100%;border-radius:4px;transition:width .6s ease;background:linear-gradient(90deg,var(--sage),var(--gold));}
.streak-badge{display:inline-flex;align-items:center;gap:4px;background:linear-gradient(135deg,var(--gold),var(--coral));color:#fff;padding:3px 10px;border-radius:20px;font-size:.7rem;font-weight:700;}
.form-group{margin-bottom:16px;}
.form-group label{display:block;font-size:.8rem;font-weight:600;color:var(--text2);margin-bottom:4px;}
.form-row{display:flex;gap:12px;}
.form-row>*{flex:1;}
.check-btn{width:28px;height:28px;border-radius:50%;border:2px solid var(--text3);background:transparent;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.check-btn.checked{background:var(--sage);border-color:var(--sage);animation:pop .3s ease;}
.check-btn.checked::after{content:'✓';color:#fff;font-size:14px;font-weight:700;}
@keyframes pop{0%{transform:scale(1);}50%{transform:scale(1.25);}100%{transform:scale(1);}}
.water-glass{width:36px;height:44px;border:2px solid var(--text3);border-radius:0 0 8px 8px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden;}
.water-glass.filled{border-color:var(--sage);}
.water-glass .water-fill{position:absolute;bottom:0;left:0;right:0;background:rgba(132,169,140,0.5);transition:height .4s ease;}
.water-glass.filled .water-fill{height:100%;background:var(--sage);}
.stars{display:flex;gap:4px;}
.stars .star{cursor:pointer;font-size:1.25rem;color:var(--text3);transition:color .15s;}
.stars .star.active{color:var(--gold);}
.confetti{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9999;}
.hidden{display:none!important;}
.fade-in{animation:fadeIn .35s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
.heatmap{display:grid;grid-template-columns:repeat(53,1fr);gap:2px;}
.heatmap-cell{width:100%;aspect-ratio:1;border-radius:2px;background:var(--bg2);}
.slider-container{position:relative;padding:4px 0;}
input[type=range]{-webkit-appearance:none;height:6px;border:none;border-radius:3px;background:var(--bg2);padding:0;}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:20px;height:20px;border-radius:50%;background:var(--sage);cursor:pointer;border:2px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,0.15);}
.tab-bar{display:flex;gap:4px;margin-bottom:16px;background:var(--bg2);padding:4px;border-radius:var(--radius-xs);}
.tab-bar button{flex:1;padding:8px 12px;border:none;background:transparent;border-radius:var(--radius-xs);font-family:var(--font);font-size:.8rem;font-weight:600;color:var(--text2);cursor:pointer;transition:all .2s;}
.tab-bar button.active{background:var(--card);color:var(--text);box-shadow:var(--shadow);}
.inline-flex{display:inline-flex;align-items:center;gap:6px;}
.gap-8{gap:8px;}.gap-12{gap:12px;}.gap-16{gap:16px;}.gap-20{gap:20px;}
.mb-8{margin-bottom:8px;}.mb-12{margin-bottom:12px;}.mb-16{margin-bottom:16px;}.mb-20{margin-bottom:20px;}.mb-24{margin-bottom:24px;}
.mt-8{margin-top:8px;}.mt-12{margin-top:12px;}.mt-16{margin-top:16px;}
.flex{display:flex;}.flex-wrap{flex-wrap:wrap;}.items-center{align-items:center;}.justify-between{justify-content:space-between;}
.w-full{width:100%;}.text-center{text-align:center;}.text-right{text-align:right;}
.text-sm{font-size:.8rem;}.text-xs{font-size:.7rem;}
.color-sage{color:var(--sage);}.color-gold{color:var(--gold);}.color-coral{color:var(--coral);}.color-text2{color:var(--text2);}
.font-bold{font-weight:700;}.font-semi{font-weight:600;}
.clickable{cursor:pointer;}.truncate{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.chart-container{position:relative;height:220px;width:100%;}
@media(max-width:500px){.form-row{flex-direction:column;}}
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:var(--sage);color:#fff;padding:10px 20px;border-radius:20px;font-size:.875rem;font-weight:600;z-index:9998;pointer-events:none;opacity:0;transition:opacity .4s;}
.drop-target{border:2px dashed var(--sage)!important;background:rgba(132,169,140,0.08)!important;}
.callout-sage{background:rgba(132,169,140,0.12);border-left:3px solid var(--sage);border-radius:6px;padding:8px 12px;margin-bottom:8px;}
.callout-gold{background:rgba(212,163,115,0.12);border-left:3px solid var(--gold);border-radius:6px;padding:8px 12px;margin-bottom:8px;}
.callout-coral{background:rgba(224,120,86,0.12);border-left:3px solid var(--coral);border-radius:6px;padding:8px 12px;margin-bottom:8px;}
.log-date-nav{display:flex;align-items:center;gap:8px;margin-bottom:16px;flex-wrap:wrap;}
.grat-archive-date{font-size:.8rem;font-weight:700;color:var(--text2);margin:16px 0 6px;padding-bottom:4px;border-bottom:1px solid var(--card-border);}
.grat-item{display:flex;align-items:flex-start;gap:6px;padding:3px 0;font-size:.875rem;}
.save-log-bar{position:sticky;bottom:80px;z-index:50;display:flex;justify-content:flex-end;padding:8px 0;}
@media(min-width:769px){.save-log-bar{bottom:16px;}}
.goals-glance{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;}
@media(max-width:768px){.goals-glance{grid-template-columns:1fr;}}
.drag-handle{cursor:grab;opacity:0.4;font-size:1rem;flex-shrink:0;}
.drag-handle:active{cursor:grabbing;}
</style>
</head>
<body>
<div class="app">
<aside class="sidebar" id="sidebar">
<div class="logo"><h1>Life Tracker</h1><p>Your 2026 Dashboard</p></div>
<nav id="sideNav"></nav>
</aside>
<main class="main" id="mainContent"></main>
</div>
<div class="bottombar" id="bottombar"><div class="bottombar-inner" id="bottomNav"></div></div>
<div class="modal-overlay" id="modalOverlay" onclick="if(event.target===this)closeModal()"><div class="modal" id="modalContent"></div></div>
<canvas class="confetti hidden" id="confettiCanvas"></canvas>

<script>
/* ===== ICONS (inline SVG strings) ===== */
const icons={
  home:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>',
  log:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>',
  calendar:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/><path d="M8 14h.01M12 14h.01M16 14h.01M8 18h.01M12 18h.01"/></svg>',
  workout:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6.5 6.5a2 2 0 013 0L12 9l2.5-2.5a2 2 0 013 0M4 14h4l1-2 3 6 2-4h6"/></svg>',
  goals:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>',
  habits:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>',
  journal:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 016.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/></svg>',
  reading:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 014 4v14a3 3 0 00-3-3H2z"/><path d="M22 3h-6a4 4 0 00-4 4v14a3 3 0 013-3h7z"/></svg>',
  money:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg>',
  settings:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>',
  gratitude:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/></svg>'
};

/* ===== NAVIGATION ===== */
const sections=[
  {id:'today',label:'Today',icon:'home'},
  {id:'dailylog',label:'Daily Log',icon:'log'},
  {id:'calendar',label:'Calendar',icon:'calendar'},
  {id:'workouts',label:'Workouts',icon:'workout'},
  {id:'goals',label:'2026 Goals',icon:'goals'},
  {id:'habits',label:'Habits',icon:'habits'},
  {id:'journal',label:'Journal',icon:'journal'},
  {id:'gratitude',label:'Gratitude',icon:'gratitude'},
  {id:'reading',label:'Reading',icon:'reading'},
  {id:'money',label:'Money',icon:'money'},
  {id:'settings',label:'Settings',icon:'settings'},
];

/* ===== DATA LAYER ===== */
const DB={
  get(k,def=null){try{const v=localStorage.getItem('lt_'+k);return v?JSON.parse(v):def;}catch(e){return def;}},
  set(k,v){try{localStorage.setItem('lt_'+k,JSON.stringify(v));}catch(e){console.warn('Storage error',e);}},
  del(k){localStorage.removeItem('lt_'+k);},
  keys(){const r=[];for(let i=0;i<localStorage.length;i++){const k=localStorage.key(i);if(k.startsWith('lt_'))r.push(k.slice(3));}return r;},
  exportAll(){const d={};for(let i=0;i<localStorage.length;i++){const k=localStorage.key(i);if(k.startsWith('lt_'))d[k]=localStorage.getItem(k);}return d;},
  importAll(d){Object.entries(d).forEach(([k,v])=>{if(k.startsWith('lt_'))localStorage.setItem(k,v);});},
  clearSection(prefix){for(let i=localStorage.length-1;i>=0;i--){const k=localStorage.key(i);if(k.startsWith('lt_'+prefix))localStorage.removeItem(k);}}
};

/* ===== QUOTES ===== */
const quotes=[
"The only way to do great work is to love what you do. — Steve Jobs",
"It is never too late to be what you might have been. — George Eliot",
"Small daily improvements over time lead to stunning results. — Robin Sharma",
"You don't have to be great to start, but you have to start to be great. — Zig Ziglar",
"The future belongs to those who believe in the beauty of their dreams. — Eleanor Roosevelt",
"What you get by achieving your goals is not as important as what you become. — Zig Ziglar",
"Believe you can and you're halfway there. — Theodore Roosevelt",
"Success is not final, failure is not fatal: it is the courage to continue that counts. — Winston Churchill",
"The best time to plant a tree was 20 years ago. The second best time is now. — Chinese Proverb",
"Your limitation—it's only your imagination.",
"Push yourself, because no one else is going to do it for you.",
"Great things never come from comfort zones.",
"Dream it. Wish it. Do it.",
"Success doesn't just find you. You have to go out and get it.",
"The harder you work for something, the greater you'll feel when you achieve it.",
"Don't stop when you're tired. Stop when you're done.",
"Wake up with determination. Go to bed with satisfaction.",
"Do something today that your future self will thank you for.",
"It's going to be hard, but hard does not mean impossible.",
"Don't wait for opportunity. Create it.",
"Sometimes we're tested not to show our weaknesses, but to discover our strengths.",
"The key to success is to focus on goals, not obstacles.",
"Dream bigger. Do bigger.",
"Don't be afraid to give up the good to go for the great. — John D. Rockefeller",
"A year from now you may wish you had started today. — Karen Lamb",
"What lies behind us and what lies before us are tiny matters compared to what lies within us. — Ralph Waldo Emerson",
"Act as if what you do makes a difference. It does. — William James",
"In the middle of every difficulty lies opportunity. — Albert Einstein",
"We are what we repeatedly do. Excellence, then, is not an act, but a habit. — Aristotle",
"The secret of getting ahead is getting started. — Mark Twain",
"Discipline is the bridge between goals and accomplishment. — Jim Rohn",
"Your body can stand almost anything. It's your mind that you have to convince.",
"The difference between ordinary and extraordinary is that little extra.",
"You are never too old to set another goal or to dream a new dream. — C.S. Lewis",
"Strive not to be a success, but rather to be of value. — Albert Einstein",
"The only person you are destined to become is the person you decide to be. — Ralph Waldo Emerson",
"Energy and persistence conquer all things. — Benjamin Franklin",
"I find that the harder I work, the more luck I seem to have. — Thomas Jefferson",
"Don't count the days. Make the days count. — Muhammad Ali",

function getQuote(date){const d=new Date(date);const idx=(d.getFullYear()*366+d.getMonth()*31+d.getDate())%quotes.length;return quotes[idx];}
function today(){return new Date().toISOString().slice(0,10);}
function todayKey(){return today().replace(/-/g,'');}
function dayOfYear(d=new Date()){const s=new Date(d.getFullYear(),0,0);return Math.floor((d-s)/86400000);}
function daysInYear(y=2026){return((y%4===0&&y%100!==0)||y%400===0)?366:365;}
function fmtDate(d){return new Date(d+'T12:00:00').toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'});}
function shortDate(d){return new Date(d+'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'});}
function getName(){return DB.get('settings',{}).name||'Friend';}
function setName(n){const s=DB.get('settings',{});s.name=n;DB.set('settings',s);}
function tomorrow(){const d=new Date();d.setDate(d.getDate()+1);return d.toISOString().slice(0,10);}
function yesterday(){const d=new Date();d.setDate(d.getDate()-1);return d.toISOString().slice(0,10);}
function fmtTime(t){if(!t)return'';const[h,m]=t.split(':').map(Number);const ampm=h>=12?'PM':'AM';return`${h%12||12}:${String(m).padStart(2,'0')} ${ampm}`;}
function logOffsetDate(offset){const d=new Date();d.setDate(d.getDate()+offset);return d.toISOString().slice(0,10);}
function showToast(msg,duration=2000){let t=document.getElementById('appToast');if(!t){t=document.createElement('div');t.id='appToast';t.className='toast';document.body.appendChild(t);}t.textContent=msg;t.style.opacity='1';clearTimeout(t._timer);t._timer=setTimeout(()=>{t.style.opacity='0';},duration);}

}

/* ===== CONFETTI ===== */
function fireConfetti(){
  const c=document.getElementById('confettiCanvas');c.classList.remove('hidden');
  const ctx=c.getContext('2d');c.width=window.innerWidth;c.height=window.innerHeight;
  const pieces=[];const colors=['#84A98C','#D4A373','#E07856','#6366F1','#EC4899','#0EA5E9'];
  for(let i=0;i<80;i++)pieces.push({x:Math.random()*c.width,y:Math.random()*c.height-c.height,w:Math.random()*8+4,h:Math.random()*6+3,color:colors[Math.floor(Math.random()*colors.length)],vx:(Math.random()-0.5)*3,vy:Math.random()*4+2,rot:Math.random()*360,vr:(Math.random()-0.5)*8});
  let frame=0;
  function draw(){ctx.clearRect(0,0,c.width,c.height);pieces.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.rot+=p.vr;p.vy+=0.05;ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.rot*Math.PI/180);ctx.fillStyle=p.color;ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);ctx.restore();});frame++;if(frame<120)requestAnimationFrame(draw);else{c.classList.add('hidden');ctx.clearRect(0,0,c.width,c.height);}}
  draw();
}

/* ===== INSIGHTS ===== */
function getInsights(){
  const ins=[];
  const habitsData=DB.get('habits',[]);
  const workoutsData=DB.get('workouts',[]);
  const moods=DB.get('dailylog_moods',{});
  const now=new Date();const thisMonth=now.toISOString().slice(0,7);

  const monthWorkouts=workoutsData.filter(w=>w.date&&w.date.startsWith(thisMonth)).length;
  if(monthWorkouts>0)ins.push(`You've worked out ${monthWorkouts} day${monthWorkouts>1?'s':''} this month. Keep the momentum going!`);

  habitsData.forEach(h=>{if(h.streak>=3)ins.push(`You're on a ${h.streak}-day ${h.name} streak. Keep going!`);});

  const moodDates=Object.keys(moods);const workoutDates=new Set(workoutsData.map(w=>w.date));
  if(moodDates.length>=5){
    let exMood=0,exCount=0,noMood=0,noCount=0;
    moodDates.forEach(d=>{if(workoutDates.has(d)){exMood+=moods[d];exCount++;}else{noMood+=moods[d];noCount++;}});
    if(exCount>0&&noCount>0){const diff=Math.round(((exMood/exCount)/(noMood/noCount)-1)*100);if(diff>10)ins.push(`Your mood is ${diff}% higher on days you exercise.`);}
  }

  const goalsData=DB.get('goals_2026',[]);
  const atRisk=goalsData.filter(g=>g.status==='At Risk').length;
  if(atRisk>0)ins.push(`${atRisk} of your 2026 goals ${atRisk===1?'is':'are'} at risk. Time to review?`);

  if(ins.length===0)ins.push('Start tracking your habits and workouts to unlock personalized insights!');
  return ins;
}

window.saveGratitude=function(i,v){const g=DB.get('gratitude_'+today(),[' ',' ',' ']);g[i]=v;DB.set('gratitude_'+today(),g);};
window.saveIntention=function(i,v){const t=DB.get('intentions_'+today(),[' ',' ',' ']);t[i]=v;DB.set('intentions_'+today(),t);};
window.toggleTodayHabit=function(id){
  const checks=DB.get('habit_checks_'+today(),{});checks[id]=!checks[id];DB.set('habit_checks_'+today(),checks);
  updateHabitStreaks();
  const allHabits=DB.get('habits',[]).filter(h=>h.active!==false);
  const allDone=allHabits.every(h=>checks[h.id]);
  if(allDone&&allHabits.length>0)fireConfetti();
  navigate('today');
};

function updateHabitStreaks(){
  const habits=DB.get('habits',[]);
  habits.forEach(h=>{
    let streak=0;const d=new Date();
    for(let i=0;i<365;i++){
      const dk=d.toISOString().slice(0,10);
      const checks=DB.get('habit_checks_'+dk,{});
      if(checks[h.id])streak++;else break;
      d.setDate(d.getDate()-1);
    }
    h.streak=streak;
    h.longestStreak=Math.max(h.longestStreak||0,streak);
  });
  DB.set('habits',habits);
}

/* ===== CALENDAR ===== */
let calYear,calMonth,calView='month';
function renderCalendar(el){
  const n=new Date();if(!calYear){calYear=n.getFullYear();calMonth=n.getMonth();}
  const events=DB.get('events',[]);
  const monthNames=['January','February','March','April','May','June','July','August','September','October','November','December'];
  const dayNames=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const first=new Date(calYear,calMonth,1);const startDay=first.getDay();
  const daysInMonth=new Date(calYear,calMonth+1,0).getDate();

  let calHTML='';
  if(calView==='month'){
    calHTML=`<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px;text-align:center;">
      ${dayNames.map(d=>`<div class="text-xs font-semi color-text2" style="padding:8px 0;">${d}</div>`).join('')}
      ${Array.from({length:startDay},()=>'<div></div>').join('')}
      ${Array.from({length:daysInMonth},(_,i)=>{
        const day=i+1;const ds=`${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
        const dayEvents=events.filter(e=>e.date===ds||isRecurring(e,ds));
        const isToday=ds===today();
        return`<div class="card-sm clickable" style="padding:6px;min-height:56px;${isToday?'border:2px solid var(--sage);':''}" onclick="showDayEvents('${ds}')">
          <div class="text-xs font-semi ${isToday?'color-sage':''}">${day}</div>
          ${dayEvents.slice(0,2).map(e=>`<div class="text-xs truncate" style="color:${catColors[e.category]||'var(--text2)'};margin-top:2px;">${e.title}</div>`).join('')}
          ${dayEvents.length>2?`<div class="text-xs color-text2">+${dayEvents.length-2}</div>`:''}
        </div>`;}).join('')}
    </div>`;
  }

  el.innerHTML=`
  <div class="flex items-center justify-between mb-16">
    <h1 class="page-title">${monthNames[calMonth]} ${calYear}</h1>
    <div class="flex gap-8">
      <button class="btn btn-secondary btn-sm" onclick="calMonth--;if(calMonth<0){calMonth=11;calYear--;}navigate('calendar')">◀</button>
      <button class="btn btn-secondary btn-sm" onclick="calMonth=new Date().getMonth();calYear=new Date().getFullYear();navigate('calendar')">Today</button>
      <button class="btn btn-secondary btn-sm" onclick="calMonth++;if(calMonth>11){calMonth=0;calYear++;}navigate('calendar')">▶</button>
      <button class="btn btn-primary btn-sm" onclick="addEvent()">+ Event</button>
    </div>
  </div>
  ${calHTML}`;
}

function isRecurring(e,ds){
  if(!e.recurring||e.recurring==='none')return false;
  const ed=new Date(e.date+'T12:00:00');const dd=new Date(ds+'T12:00:00');
  if(dd<ed)return false;
  if(e.recurring==='daily')return true;
  if(e.recurring==='weekly')return ed.getDay()===dd.getDay();
  if(e.recurring==='monthly')return ed.getDate()===dd.getDate();
  return false;
}

    const cells=[];const d=new Date();d.setDate(d.getDate()-d.getDay());d.setDate(d.getDate()-52*7);
    for(let w=0;w<53;w++){for(let dd=0;dd<7;dd++){
      const ds=new Date(d);ds.setDate(d.getDate()+w*7+dd);
      const dk=ds.toISOString().slice(0,10);

    return`<div class="card mb-16">
      <div class="flex items-center justify-between mb-12">

        <button class="btn-ghost text-xs" onclick="deleteHabit('${h.id}')">✕</button>
      </div>
      <div class="heatmap">${cells.map(c=>`<div class="heatmap-cell" style="background:${c.done?'var(--sage)':'var(--bg2)'}" title="${c.date}"></div>`).join('')}</div>

      </div>
      <div class="progress-bar mb-4"><div class="progress-fill" style="width:${Math.min(100,savingsPct)}%"></div></div>
      <div class="text-xs color-text2">${savingsPct}% of goal</div>
    </div>
    <div class="card">
      <div class="card-title flex justify-between">Net Worth <button class="btn btn-secondary btn-sm" onclick="addNetWorth()">+ Snapshot</button></div>

      <div class="mb-12"><div class="flex justify-between mb-4"><span class="font-semi">${d.name}</span><span class="text-sm color-coral">$${d.remaining.toLocaleString()} left</span></div>

  </div>`;

  if(finance.netWorth.length){
    setTimeout(()=>{
      const c=document.getElementById('nwChart');

window.exportData=function(){
  const d=DB.exportAll();
  const blob=new Blob([JSON.stringify(d,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download=`life-tracker-backup-${today()}.json`;a.click();URL.revokeObjectURL(a.href);
};

window.importData=function(input){
  const f=input.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=function(e){
    try{const d=JSON.parse(e.target.result);DB.importAll(d);alert('Data imported successfully!');navigate('today');}
    catch(err){alert('Invalid JSON file.');}
  };
  r.readAsText(f);
};

  const theme=DB.get('theme','light');
  if(theme==='dark')document.documentElement.classList.add('dark');
  buildNav();
  navigate('today');
}

document.addEventListener('DOMContentLoaded',init);

/* ===== SERVICE WORKER ===== */
if('serviceWorker' in navigator){
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/life-planner/sw.js')
      .catch(err => console.warn('SW registration failed:', err));
  });
}
</script>
</body>
