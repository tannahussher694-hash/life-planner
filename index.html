<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#0A0A0A">
<link rel="manifest" href="manifest.json">
<title>Life Planner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,300;1,9..40,400&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
/* ============================================================
   DESIGN TOKENS
   ============================================================ */
/* ============================================================
   BLACK & GOLD LUXURY PALETTE — always-dark, v2 redesign
   ============================================================ */
:root {
  /* Backgrounds — pure blacks and very dark charcoals */
  --bg:        #0A0A0A;
  --bg2:       #111111;
  --bg3:       #1A1A1A;
  --surface:   #141414;
  --border:    #242424;
  --border2:   #2E2E2E;

  /* Text */
  --text:      #F0EDE8;
  --text2:     #9A9488;
  --text3:     #5C574F;
  --text-inv:  #0A0A0A;

  /* Gold accent — primary brand colour */
  --gold:      #C9A84C;
  --gold-light:#1E1908;
  --gold-mid:  #A07830;

  /* Keep sage/terra as secondary accents, tuned for dark context */
  --sage:      #5A8A6A;
  --sage-light:#0D1F13;
  --sage-mid:  #3D6B4E;
  --terra:     #B06040;
  --terra-light:#1E0E08;

  /* Ink — the darkest surface (sidebar) */
  --ink:       #050505;

  /* Functional */
  --danger:    #C0392B;
  --success:   #27AE60;

  /* Layout */
  --sidebar-w: 240px;
  --radius:    16px;
  --radius-sm: 10px;
  --radius-xs: 7px;
  --radius-pill: 100px;

  /* Shadows — heavier on pure black for depth */
  --shadow-xs: 0 1px 3px rgba(0,0,0,0.5);
  --shadow-sm: 0 2px 8px rgba(0,0,0,0.6), 0 0 0 1px rgba(201,168,76,0.06);
  --shadow:    0 4px 20px rgba(0,0,0,0.7), 0 1px 4px rgba(0,0,0,0.5);
  --shadow-lg: 0 12px 40px rgba(0,0,0,0.8), 0 2px 8px rgba(0,0,0,0.6);

  /* Typography */
  --font-serif: 'DM Serif Display', Georgia, serif;
  --font-sans:  'DM Sans', system-ui, sans-serif;

  /* Easing */
  --ease-out:   cubic-bezier(0.16, 1, 0.3, 1);
  --ease-in-out:cubic-bezier(0.4, 0, 0.2, 1);
}

/* ============================================================
   BASE RESET
   ============================================================ */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html { font-size: 16px; -webkit-font-smoothing: antialiased; }
body {
  font-family: var(--font-sans);
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  min-height: 100dvh;
  transition: background 0.4s, color 0.4s;
  overflow-x: hidden;
}
::selection { background: var(--gold); color: #0A0A0A; }

/* Scrollbar */
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

/* ============================================================
   LAYOUT
   ============================================================ */
#app { display: flex; min-height: 100dvh; }

/* Sidebar */
.sidebar {
  position: fixed; top: 0; left: 0; bottom: 0;
  width: var(--sidebar-w);
  background: var(--ink);
  display: flex; flex-direction: column;
  z-index: 200;
  transition: transform 0.35s var(--ease-out);
}
.sidebar-logo {
  padding: 28px 24px 20px;
  border-bottom: 1px solid rgba(201,168,76,0.12);
}
.sidebar-logo h1 {
  font-family: var(--font-serif);
  font-size: 1.35rem;
  color: var(--gold);
  letter-spacing: -0.01em;
  line-height: 1.1;
}
.sidebar-logo p {
  font-size: 0.72rem;
  color: #5C574F;
  margin-top: 3px;
  letter-spacing: 0.04em;
  text-transform: uppercase;
}

.sidebar-nav { flex: 1; overflow-y: auto; padding: 12px 0; }

.nav-section-label {
  font-size: 0.65rem;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: #3D3830;
  padding: 16px 20px 6px;
}

.nav-item {
  display: flex; align-items: center; gap: 10px;
  padding: 9px 20px;
  color: #706860;
  font-size: 0.835rem;
  font-weight: 500;
  cursor: pointer;
  transition: color 0.2s, background 0.2s;
  border-radius: 0;
  text-decoration: none;
  border: none; background: none;
  width: 100%; text-align: left;
}
.nav-item:hover { color: #E8E0D0; background: rgba(201,168,76,0.06); }
.nav-item.active {
  color: var(--gold);
  background: rgba(201,168,76,0.10);
}
.nav-item.active .nav-dot { background: var(--gold); }
.nav-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: transparent; flex-shrink: 0;
  transition: background 0.2s;
}
.nav-icon { width: 17px; height: 17px; flex-shrink: 0; opacity: 0.7; }
.nav-item.active .nav-icon { opacity: 1; }

.sidebar-footer {
  padding: 16px 20px;
  border-top: 1px solid rgba(201,168,76,0.12);
  display: flex; align-items: center; gap: 10px;
}
.sidebar-avatar {
  width: 34px; height: 34px; border-radius: 50%;
  background: linear-gradient(135deg, var(--sage), var(--terra));
  display: flex; align-items: center; justify-content: center;
  font-size: 0.85rem; font-weight: 700; color: white;
  flex-shrink: 0;
}
.sidebar-user-name { font-size: 0.8rem; font-weight: 600; color: #9A9488; }
.sidebar-user-sub  { font-size: 0.68rem; color: #5C574F; }

/* Main content */
.main {
  margin-left: var(--sidebar-w);
  flex: 1;
  min-height: 100dvh;
  display: flex; flex-direction: column;
}

/* Page inner */
.page { padding: 36px 40px; max-width: 980px; animation: pageIn 0.3s var(--ease-out); }
@keyframes pageIn {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ============================================================
   TYPOGRAPHY
   ============================================================ */
.serif { font-family: var(--font-serif); }
.page-title {
  font-family: var(--font-serif);
  font-size: 2.1rem;
  font-weight: 400;
  letter-spacing: -0.02em;
  line-height: 1.15;
  color: var(--text);
}
.page-sub {
  font-size: 0.875rem;
  color: var(--text2);
  margin-top: 4px;
}
.section-label {
  font-size: 0.68rem;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--text3);
  margin-bottom: 12px;
}
.card-title {
  font-size: 0.8rem;
  font-weight: 700;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  color: var(--text3);
  margin-bottom: 14px;
}

/* ============================================================
   CARDS
   ============================================================ */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 24px;
  box-shadow: var(--shadow-xs);
  transition: box-shadow 0.2s, border-color 0.2s;
}
.card:hover { box-shadow: var(--shadow-sm); }
.card-sm { padding: 16px; border-radius: var(--radius-sm); }
.card-inset {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 14px 16px;
}

/* ============================================================
   HERO CARD (time-of-day adaptive)
   ============================================================ */
.hero-card {
  border-radius: var(--radius);
  padding: 36px 40px;
  position: relative;
  overflow: hidden;
  margin-bottom: 28px;
  color: white;
  min-height: 180px;
  display: flex; flex-direction: column; justify-content: flex-end;
}
.hero-card.morning  { background: linear-gradient(135deg, #1A1200 0%, #2A1E00 50%, #1A1008 100%); border: 1px solid rgba(201,168,76,0.25); }
.hero-card.afternoon{ background: linear-gradient(135deg, #1A0E00 0%, #2A1800 50%, #1E1008 100%); border: 1px solid rgba(201,168,76,0.20); }
.hero-card.evening  { background: linear-gradient(135deg, #080808 0%, #141414 50%, #0A0E14 100%); border: 1px solid rgba(201,168,76,0.15); }
.hero-card::before {
  content: '';
  position: absolute; inset: 0;
  background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
}
.hero-greeting {
  font-family: var(--font-serif);
  font-size: 2rem;
  font-weight: 400;
  letter-spacing: -0.02em;
  line-height: 1.2;
  position: relative; z-index: 1;
}
.hero-sub {
  font-size: 0.875rem;
  opacity: 0.8;
  margin-top: 6px;
  position: relative; z-index: 1;
}
.hero-quote {
  font-size: 0.78rem;
  font-style: italic;
  opacity: 0.65;
  margin-top: 18px;
  max-width: 500px;
  position: relative; z-index: 1;
  line-height: 1.6;
}

/* ============================================================
   STATS ROW
   ============================================================ */
.stats-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 12px;
  margin-bottom: 28px;
}
.stat-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 18px 20px;
  cursor: pointer;
  transition: box-shadow 0.2s, transform 0.2s;
}
.stat-card:hover { box-shadow: var(--shadow); transform: translateY(-1px); }
.stat-num {
  font-family: var(--font-serif);
  font-size: 2rem;
  line-height: 1;
  letter-spacing: -0.03em;
}
.stat-label {
  font-size: 0.7rem;
  font-weight: 600;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  color: var(--text3);
  margin-top: 5px;
}

/* ============================================================
   PROGRESS ARC
   ============================================================ */
.progress-arc-wrap {
  display: flex; align-items: center; justify-content: center;
  flex-direction: column; gap: 4px;
}
.arc-label { font-size: 0.7rem; color: var(--text3); text-align: center; }

/* ============================================================
   HABIT CHECKS
   ============================================================ */
.habit-row {
  display: flex; align-items: center; gap: 12px;
  padding: 10px 0;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  transition: background 0.15s;
}
.habit-row:last-child { border-bottom: none; }
.habit-row:hover { background: var(--bg2); margin: 0 -16px; padding-left: 16px; padding-right: 16px; border-radius: 6px; border-bottom: 1px solid transparent; }
.habit-check {
  width: 26px; height: 26px; border-radius: 50%;
  border: 2px solid var(--border2);
  background: transparent;
  flex-shrink: 0;
  cursor: pointer;
  transition: all 0.25s var(--ease-out);
  display: flex; align-items: center; justify-content: center;
}
.habit-check.done {
  background: var(--gold);
  border-color: var(--gold);
  animation: habitPop 0.4s var(--ease-out);
}
@keyframes habitPop {
  0%   { transform: scale(1); }
  40%  { transform: scale(1.35); }
  70%  { transform: scale(0.92); }
  100% { transform: scale(1); }
}
.habit-check.done::after {
  content: '';
  display: block; width: 10px; height: 6px;
  border-left: 2px solid white; border-bottom: 2px solid white;
  transform: rotate(-45deg) translate(1px, -1px);
}
.habit-name {
  font-size: 0.875rem; flex: 1;
  transition: opacity 0.2s, text-decoration 0.2s;
}
.habit-name.done { opacity: 0.4; text-decoration: line-through; }
.streak-pill {
  font-size: 0.65rem; font-weight: 700;
  background: var(--sage-light); color: var(--sage);
  padding: 2px 8px; border-radius: var(--radius-pill);
}

/* ============================================================
   PROGRESS BAR
   ============================================================ */
.progress-bar { height: 5px; background: var(--bg3); border-radius: 3px; overflow: hidden; }
.progress-fill {
  height: 100%; border-radius: 3px;
  background: linear-gradient(90deg, var(--gold-mid), var(--gold));
  transition: width 0.6s var(--ease-out);
}
.progress-fill.terra { background: linear-gradient(90deg, var(--terra), var(--gold)); }

/* ============================================================
   INPUTS
   ============================================================ */
input, textarea, select {
  font-family: var(--font-sans);
  font-size: 0.9rem;
  padding: 10px 14px;
  border: 1.5px solid var(--border);
  border-radius: var(--radius-xs);
  background: var(--bg);
  color: var(--text);
  width: 100%;
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
  -webkit-appearance: none;
  -webkit-user-select: text;
  user-select: text;
}
input:focus, textarea:focus, select:focus {
  border-color: var(--gold);
  box-shadow: 0 0 0 3px rgba(201,168,76,0.15);
}
textarea { resize: vertical; min-height: 88px; line-height: 1.6; }
select { cursor: pointer; }
label {
  display: block;
  font-size: 0.775rem; font-weight: 600;
  color: var(--text2);
  margin-bottom: 5px;
}

/* ============================================================
   BUTTONS
   ============================================================ */
.btn {
  display: inline-flex; align-items: center; gap: 7px;
  padding: 9px 18px;
  border: none; border-radius: var(--radius-xs);
  font-family: var(--font-sans); font-size: 0.835rem; font-weight: 600;
  cursor: pointer; transition: all 0.2s; text-decoration: none;
  white-space: nowrap;
}
.btn-primary {
  background: var(--gold); color: #0A0A0A;
  box-shadow: 0 2px 8px rgba(201,168,76,0.35);
}
.btn-primary:hover { background: var(--gold-mid); transform: translateY(-1px); box-shadow: 0 4px 14px rgba(201,168,76,0.5); }
.btn-secondary {
  background: var(--bg2); color: var(--text);
  border: 1.5px solid var(--border);
}
.btn-secondary:hover { border-color: var(--gold); background: var(--bg); color: var(--gold); }
.btn-ghost { background: transparent; color: var(--text2); padding: 7px 10px; }
.btn-ghost:hover { color: var(--text); background: var(--bg2); }
.btn-sm { padding: 6px 13px; font-size: 0.78rem; }
.btn-terra { background: var(--terra); color: white; box-shadow: 0 2px 8px rgba(176,96,64,0.3); }
.btn-terra:hover { background: #8A4830; transform: translateY(-1px); }

/* ============================================================
   TAGS / CHIPS
   ============================================================ */
.tag {
  display: inline-block; padding: 3px 10px;
  border-radius: var(--radius-pill);
  font-size: 0.68rem; font-weight: 700;
  letter-spacing: 0.02em;
}
.tag-sage  { background: var(--sage-light);  color: var(--sage); }
.tag-terra { background: var(--terra-light); color: var(--terra); }
.tag-gold  { background: var(--gold-light);  color: var(--gold); }
.tag-muted { background: var(--bg3); color: var(--text3); }

/* ============================================================
   MODAL
   ============================================================ */
.modal-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.75);
  z-index: 1000; align-items: center; justify-content: center;
  padding: 20px;
  backdrop-filter: blur(4px);
}
.modal-overlay.open { display: flex; }
.modal {
  background: var(--surface);
  border-radius: var(--radius);
  padding: 32px;
  width: 100%; max-width: 520px;
  max-height: 88vh; overflow-y: auto;
  box-shadow: var(--shadow-lg);
  animation: modalIn 0.3s var(--ease-out);
  border: 1px solid var(--border);
}
@keyframes modalIn {
  from { opacity: 0; transform: translateY(16px) scale(0.98); }
  to   { opacity: 1; transform: translateY(0)    scale(1); }
}
.modal-title {
  font-family: var(--font-serif);
  font-size: 1.5rem;
  margin-bottom: 20px;
}
.modal-actions {
  display: flex; gap: 10px; justify-content: flex-end; margin-top: 24px;
  padding-top: 20px; border-top: 1px solid var(--border);
}

/* ============================================================
   FORM GROUPS
   ============================================================ */
.form-group { margin-bottom: 16px; }
.form-row { display: flex; gap: 12px; }
.form-row > * { flex: 1; }

/* ============================================================
   FOCUS RING TIMER
   ============================================================ */
.focus-ring-wrap {
  display: flex; flex-direction: column; align-items: center; gap: 20px;
  padding: 20px 0;
}
.focus-ring {
  position: relative; width: 200px; height: 200px;
}
.focus-ring svg {
  width: 200px; height: 200px;
  transform: rotate(-90deg);
}
.focus-ring circle { fill: none; stroke-width: 8; }
.focus-track  { stroke: var(--bg3); }
.focus-prog   {
  stroke: var(--gold); stroke-dasharray: 565; stroke-dashoffset: 0;
  stroke-linecap: round;
  transition: stroke-dashoffset 1s linear, stroke 0.4s;
}
.focus-prog.break { stroke: var(--terra); }
.focus-center {
  position: absolute; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 2px;
}
.focus-time-display {
  font-family: var(--font-serif);
  font-size: 2.6rem;
  letter-spacing: -0.04em;
  line-height: 1;
}
.focus-mode-label {
  font-size: 0.65rem; font-weight: 700;
  letter-spacing: 0.08em; text-transform: uppercase;
  color: var(--text3);
}
.focus-mode-btns {
  display: flex; gap: 8px; flex-wrap: wrap; justify-content: center;
}
.focus-mode-btn {
  padding: 6px 16px; border: 1.5px solid var(--border);
  border-radius: var(--radius-pill);
  background: transparent; font-family: var(--font-sans);
  font-size: 0.78rem; font-weight: 600; color: var(--text2);
  cursor: pointer; transition: all 0.2s;
}
.focus-mode-btn.active {
  background: var(--sage); color: white; border-color: var(--sage);
}

/* ============================================================
   JOURNAL
   ============================================================ */
.journal-entry {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 20px;
  margin-bottom: 12px;
  transition: box-shadow 0.2s;
}
.journal-entry:hover { box-shadow: var(--shadow-sm); }
.journal-date { font-size: 0.72rem; color: var(--text3); font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; }
.journal-text { font-size: 0.9rem; line-height: 1.7; margin-top: 8px; color: var(--text); white-space: pre-wrap; }

/* ============================================================
   MOOD SELECTOR
   ============================================================ */
.mood-grid {
  display: flex; gap: 8px; flex-wrap: wrap;
}
.mood-btn {
  padding: 8px 14px; border-radius: var(--radius-pill);
  border: 1.5px solid var(--border); background: transparent;
  font-size: 0.82rem; font-weight: 600; cursor: pointer;
  transition: all 0.2s; color: var(--text2);
}
.mood-btn.active { background: var(--gold); color: #0A0A0A; border-color: var(--gold); }
.mood-btn:hover:not(.active) { border-color: var(--gold); color: var(--gold); }

/* ============================================================
   AI PANEL
   ============================================================ */
.ai-panel {
  position: fixed;
  bottom: 24px; right: 24px;
  width: 380px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  box-shadow: var(--shadow-lg);
  z-index: 500;
  display: flex; flex-direction: column;
  max-height: 520px;
  animation: panelIn 0.35s var(--ease-out);
  overflow: hidden;
}
@keyframes panelIn {
  from { opacity: 0; transform: translateY(16px) scale(0.97); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}
.ai-panel-header {
  padding: 16px 18px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 10px;
}
.ai-avatar {
  width: 32px; height: 32px; border-radius: 50%;
  background: linear-gradient(135deg, var(--sage), var(--terra));
  display: flex; align-items: center; justify-content: center;
  font-size: 0.85rem; flex-shrink: 0;
}
.ai-panel-title { font-size: 0.875rem; font-weight: 700; flex: 1; }
.ai-panel-sub   { font-size: 0.72rem; color: var(--text3); }
.ai-messages {
  flex: 1; overflow-y: auto; padding: 16px;
  display: flex; flex-direction: column; gap: 10px;
}
.ai-msg {
  max-width: 88%; font-size: 0.845rem; line-height: 1.6;
  padding: 10px 14px; border-radius: 14px;
}
.ai-msg.system {
  background: var(--bg2); color: var(--text);
  border-radius: 4px 14px 14px 14px;
  align-self: flex-start;
}
.ai-msg.user {
  background: var(--gold); color: #0A0A0A;
  border-radius: 14px 14px 4px 14px;
  align-self: flex-end;
}
.ai-msg.typing { opacity: 0.6; font-style: italic; }
.ai-input-row {
  padding: 12px 14px;
  border-top: 1px solid var(--border);
  display: flex; gap: 8px;
}
.ai-input {
  flex: 1; font-size: 0.835rem; padding: 8px 12px;
  border: 1.5px solid var(--border); border-radius: var(--radius-pill);

function getSupa(){if(!_supa&&window.supabase)_supa=window.supabase.createClient(SUPA_URL,SUPA_KEY);return _supa;}
const _cache={};
(function seedCache(){for(let i=0;i<localStorage.length;i++){const k=localStorage.key(i);if(k&&k.startsWith('lt_')){try{_cache[k.slice(3)]=JSON.parse(localStorage.getItem(k));}catch(e){}}}})();

/* Modal */
function openModal(html){document.getElementById('modal-content').innerHTML=html;document.getElementById('modal-overlay').classList.add('open');}

/* Toast */
function showToast(msg, dur=2400){
  const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),dur);
}

/* Confetti */
function fireConfetti(){
  const c=document.getElementById('confetti');const ctx=c.getContext('2d');c.width=window.innerWidth;c.height=window.innerHeight;
  const cols=['#84a98c','#d4a373','#e07856','#6366f1','#ec4899','#0ea5e9'];
  const pieces=Array.from({length:90},()=>({x:Math.random()*c.width,y:Math.random()*c.height-c.height,w:Math.random()*8+4,h:Math.random()*6+3,color:cols[Math.floor(Math.random()*cols.length)],vx:(Math.random()-0.5)*4,vy:Math.random()*5+2,rot:Math.random()*360,vr:(Math.random()-0.5)*9}));
  let f=0;function draw(){ctx.clearRect(0,0,c.width,c.height);pieces.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.rot+=p.vr;p.vy+=0.06;ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.rot*Math.PI/180);ctx.fillStyle=p.color;ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);ctx.restore();});f++;if(f<130)requestAnimationFrame(draw);else ctx.clearRect(0,0,c.width,c.height);}draw();
}

/* Habit streaks */
function updateHabitStreaks(){
  const habits=DB.get('habits',[]);
  habits.forEach(h=>{let streak=0;const d=new Date();for(let i=0;i<365;i++){const dk=d.toISOString().slice(0,10);const ch=DB.get('habit_checks_'+dk,{});if(ch[h.id])streak++;else break;d.setDate(d.getDate()-1);}h.streak=streak;h.longestStreak=Math.max(h.longestStreak||0,streak);});
  DB.set('habits',habits);
}

function isRecurring(e,ds){
  if(!e.recurring||e.recurring==='none')return false;
  const ed=new Date(e.date+'T12:00:00');const dd=new Date(ds+'T12:00:00');
  if(dd<ed)return false;
  if(e.recurring==='daily')return true;
  if(e.recurring==='weekly')return ed.getDay()===dd.getDay();
  if(e.recurring==='monthly')return ed.getDate()===dd.getDate();
  return false;
}

/* ============================================================
   NAVIGATE
   ============================================================ */
function navigate(id){
  currentSection = id;
  destroyCharts();
  // Update sidebar nav
  document.querySelectorAll('.nav-item').forEach(el => {
    el.classList.toggle('active', el.dataset.section === id);
  });
  // Update bottom nav
  document.querySelectorAll('.bottom-nav-item').forEach(el => {
    el.classList.toggle('active', el.dataset.section === id);
  });
  // Render
  const main = document.getElementById('main-content');
  main.innerHTML = '';
  const renderers = {today:renderToday,journal:renderJournal,habits:renderHabits,focus:renderFocus,goals:renderGoals,calendar:renderCalendar,dailylog:renderDailyLog,gratitude:renderGratitude,reading:renderReading,workouts:renderWorkouts,ultra:renderUltra,money:renderMoney,northstar:renderNorthstar,sobriety:renderSobriety,relationships:renderRelationships,rewards:renderAchievements,archive:renderArchive,settings:renderSettings};
  try{if(renderers[id])renderers[id](main);}
  catch(err){main.innerHTML=`<div class="page"><div class="callout terra"><strong>Render error in "${id}"</strong><pre style="margin-top:8px;font-size:.75rem;white-space:pre-wrap">${err.message}</pre></div></div>`;}
}

function buildShell(){

        <p>Your 2026 Dashboard</p>

    </main>
    <nav class="bottom-nav" id="bottom-nav">
      <div class="bottom-nav-inner" id="bottom-nav-inner"></div>
    </nav>
  `;

  // Build sidebar nav
  const nav = document.getElementById('sidebar-nav');
  navSections.forEach(sec => {
    if(sec.label){
      const label = document.createElement('div');
      label.className = 'nav-section-label';
      label.textContent = sec.label;
      nav.appendChild(label);
    }
    sec.items.forEach(id => {
      const cfg = navConfig.find(n => n.section === id);
      if(!cfg) return;
      const btn = document.createElement('button');
      btn.className = 'nav-item';
      btn.dataset.section = id;
      btn.innerHTML = `<span class="nav-dot"></span>${svgIcon(cfg.icon)}<span>${cfg.label}</span>`;
      btn.onclick = () => navigate(id);
      nav.appendChild(btn);
    });
  });

  // Build bottom nav (top 5)
  const botItems = ['today','journal','habits','focus','goals'];
  const botNav = document.getElementById('bottom-nav-inner');
  botItems.forEach(id => {
    const cfg = navConfig.find(n => n.section === id);
    if(!cfg) return;
    const btn = document.createElement('button');
    btn.className = 'bottom-nav-item';
    btn.dataset.section = id;
    btn.innerHTML = `${svgIcon(cfg.icon)}<span>${cfg.label}</span>`;
    btn.onclick = () => navigate(id);
    botNav.appendChild(btn);
  });
}

    ${insight ? `<div class="callout mb-20" style="display:flex;align-items:center;gap:10px">
      <span style="font-size:1rem;flex-shrink:0">${svgIcon('sparkle')}</span>

window.toggleTodayHabit=function(id){
  const checks=DB.get('habit_checks_'+today(),{});checks[id]=!checks[id];DB.set('habit_checks_'+today(),checks);
  updateHabitStreaks();
  const allH=DB.get('habits',[]).filter(h=>h.active!==false);
  if(allH.length>0&&allH.every(h=>checks[h.id]))fireConfetti();

      <div class="focus-ring-wrap">
        <div class="focus-ring">
          <svg viewBox="0 0 200 200">
            <circle class="focus-track" cx="100" cy="100" r="90"/>

          </svg>

          </div>
        </div>
        <div class="focus-mode-btns">
          <button class="focus-mode-btn ${focusMode==='focus'?'active':''}" onclick="setFocusMode('focus',1500)">25 min</button>
          <button class="focus-mode-btn ${focusMode==='focus50'?'active':''}" onclick="setFocusMode('focus50',3000)">50 min</button>
          <button class="focus-mode-btn ${focusMode==='break'?'active':''}" onclick="setFocusMode('break',300)">5 min break</button>
          <button class="focus-mode-btn ${focusMode==='break15'?'active':''}" onclick="setFocusMode('break15',900)">15 min break</button>
        </div>
        <div class="flex gap-12">
          <button class="btn btn-primary" id="focus-start-btn" onclick="toggleFocusTimer()">${focusRunning?'Pause':'Start Focus'}</button>
          <button class="btn btn-secondary" onclick="resetFocusTimer()">Reset</button>
        </div>
        <div class="form-group" style="width:100%;max-width:320px;text-align:left">
          <label>Session label (optional)</label>
          <input id="focus-label" placeholder="What are you working on?" value="${DB.get('focus_label','')}" oninput="DB.set('focus_label',this.value)">
        </div>
      </div>
    </div>

    ${log.length?`<div class="section-label">Session History</div>
    ${log.map(s=>`<div class="card-inset mb-8 flex items-center justify-between">
      <div><span class="font-semi text-sm">${s.label||'Focus Session'}</span><span class="text-xs text-muted" style="margin-left:8px">${shortDate(s.date)} · ${s.duration} min</span></div>
      <span class="tag tag-sage">${s.mode==='break'?'Break':'Deep Work'}</span>
    </div>`).join('')}`:''}
  </div>`;

  updateFocusDisplay();
}

function formatFocusTime(sec){const m=Math.floor(sec/60);const s=sec%60;return`${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;}
function updateFocusDisplay(){
  const td=document.getElementById('focus-time-display');const ml=document.getElementById('focus-mode-label');const pc=document.getElementById('focus-prog-circle');const sb=document.getElementById('focus-start-btn');
  if(td)td.textContent=formatFocusTime(focusSeconds);
  if(ml)ml.textContent=focusMode==='break'||focusMode==='break15'?'BREAK':'FOCUS';
  if(pc){const c=565;const prog=focusSeconds/focusMax;pc.style.strokeDashoffset=c*(1-prog);}
  if(sb)sb.textContent=focusRunning?'Pause':'Start';
}
window.setFocusMode=function(mode,max){focusMode=mode;focusMax=max;focusSeconds=max;if(focusTimer){clearInterval(focusTimer);focusTimer=null;focusRunning=false;}navigate('focus');};
window.toggleFocusTimer=function(){
  if(focusRunning){clearInterval(focusTimer);focusTimer=null;focusRunning=false;updateFocusDisplay();}
  else{
    if(!focusSeconds||focusSeconds<=0)focusSeconds=focusMax;
    focusRunning=true;
    focusTimer=setInterval(()=>{
      focusSeconds--;updateFocusDisplay();
      if(focusSeconds<=0){clearInterval(focusTimer);focusTimer=null;focusRunning=false;
        const mins=Math.round(focusMax/60);const log=DB.get('focus_log',[]);
        log.push({id:Date.now().toString(36),date:today(),duration:mins,mode:focusMode,label:DB.get('focus_label','')});
        DB.set('focus_log',log);showToast(`Session complete — ${mins} min ✓`,3000);navigate('focus');}
    },1000);
    updateFocusDisplay();
  }
};
window.resetFocusTimer=function(){clearInterval(focusTimer);focusTimer=null;focusRunning=false;focusSeconds=focusMax;updateFocusDisplay();};

/* ============================================================
   RENDER: ARCHIVE
   ============================================================ */
function renderArchive(el){
  // Collect all entries from the three sources
  const entries=[];

  // 1. Journal entries — stored as array under 'journal_entries'
  (DB.get('journal_entries',[])).forEach(e=>{
    if(e&&e.text&&e.text.trim())entries.push({type:'journal',date:e.date||today(),text:e.text,mood:e.mood,id:e.id});
  });

  // 2. Gratitude entries — stored per-day as 'gratitude_YYYY-MM-DD'
  DB.keys().filter(k=>k.startsWith('gratitude_')).forEach(k=>{
    const date=k.replace('gratitude_','');
    const items=(DB.get(k,[])).filter(v=>v&&v.trim()&&v.trim()!==' ');
    if(items.length)entries.push({type:'gratitude',date,items,id:'grat_'+date});
  });

  // 3. Daily log reflections — stored per-day as 'daylog_YYYY-MM-DD'
  DB.keys().filter(k=>k.startsWith('daylog_')).forEach(k=>{
    const date=k.replace('daylog_','');
    const log=DB.get(k,{});
    const r=log.reflection||{};
    const hasContent=r.win||r.learned||r.tomorrow;
    if(hasContent)entries.push({type:'dailylog',date,win:r.win,learned:r.learned,tomorrow:r.tomorrow,mood:log.mood,id:'dl_'+date});
  });

  // Sort reverse-chronological
  entries.sort((a,b)=>b.date.localeCompare(a.date));

  // Filter state stored in module-level var
  if(!window._archiveFilter)window._archiveFilter='all';
  const filter=window._archiveFilter;
  const visible=filter==='all'?entries:entries.filter(e=>e.type===filter);

  // Colour map
  const typeStyle={
    journal:  {border:'var(--sage)',  label:'Journal',   tag:'tag-sage'},
    gratitude:{border:'var(--gold)',  label:'Gratitude', tag:'tag-gold'},
    dailylog: {border:'var(--terra)', label:'Daily Log', tag:'tag-muted'},
  };

  const filterBtn=(f,label)=>`<button onclick="window._archiveFilter='${f}';navigate('archive')" style="padding:6px 14px;border-radius:20px;border:1px solid ${filter===f?'var(--gold)':'var(--border)'};background:${filter===f?'var(--gold)':'var(--bg2)'};color:${filter===f?'#0A0A0A':'var(--text)'};font-size:.8rem;cursor:pointer">${label}</button>`;

  const entryHTML=visible.length===0
    ?'<div class="empty" style="margin-top:40px">No entries yet. Start journaling, logging gratitude, or filling in your daily log.</div>'
    :visible.map(e=>{
      const s=typeStyle[e.type];
      if(e.type==='journal'){
        return`<div style="border-left:3px solid ${s.border};background:var(--bg2);border-radius:0 var(--radius-xs) var(--radius-xs) 0;padding:14px 16px;margin-bottom:10px">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
            <span class="text-xs text-muted">${fmtDate(e.date)}</span>
            <span class="tag ${s.tag}" style="font-size:.7rem">${s.label}${e.mood?' · '+e.mood:''}</span>
          </div>
          <div style="font-size:.875rem;line-height:1.6;white-space:pre-wrap">${e.text.replace(/</g,'&lt;').slice(0,400)}${e.text.length>400?'…':''}</div>
        </div>`;
      }
      if(e.type==='gratitude'){
        return`<div style="border-left:3px solid ${s.border};background:var(--bg2);border-radius:0 var(--radius-xs) var(--radius-xs) 0;padding:14px 16px;margin-bottom:10px">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
            <span class="text-xs text-muted">${fmtDate(e.date)}</span>
            <span class="tag ${s.tag}" style="font-size:.7rem">${s.label}</span>
          </div>
          <ul style="margin:0;padding-left:16px;font-size:.875rem;line-height:1.8">${e.items.map(v=>`<li>${v.replace(/</g,'&lt;')}</li>`).join('')}</ul>
        </div>`;
      }
      if(e.type==='dailylog'){
        const rows=[[e.win,'Win'],[e.learned,'Learned'],[e.tomorrow,'Tomorrow']].filter(([v])=>v&&v.trim());
        return`<div style="border-left:3px solid ${s.border};background:var(--bg2);border-radius:0 var(--radius-xs) var(--radius-xs) 0;padding:14px 16px;margin-bottom:10px">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
            <span class="text-xs text-muted">${fmtDate(e.date)}</span>
            <span class="tag ${s.tag}" style="font-size:.7rem">${s.label}${e.mood!=null?` · Mood ${e.mood}`:''}</span>
          </div>
          ${rows.map(([v,label])=>`<div style="font-size:.8rem;color:var(--text3);margin-bottom:2px">${label}</div><div style="font-size:.875rem;line-height:1.5;margin-bottom:8px;white-space:pre-wrap">${v.replace(/</g,'&lt;').slice(0,300)}${v.length>300?'…':''}</div>`).join('')}
        </div>`;
      }
      return'';
    }).join('');

  el.innerHTML=`<div class="page">
    <div class="page-header"><h1 class="page-title">Archive</h1></div>
    <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px">
      ${filterBtn('all','All ('+entries.length+')')}
      ${filterBtn('journal','Journal')}
      ${filterBtn('gratitude','Gratitude')}
      ${filterBtn('dailylog','Daily Log')}
    </div>
    ${entryHTML}
  </div>`;
}

function renderUltra(el){

  const weekKm=workouts.filter(w=>w.date>=weekStart.toISOString().slice(0,10)&&w.type==='Run').reduce((a,w)=>a+(w.distance||0),0);

  const phases=[{label:'Base',color:'var(--sage)'},  {label:'Build',color:'var(--terra)'},  {label:'Peak',color:'var(--gold)'},  {label:'Taper',color:'oklch(60% 0.14 290)'}];

  el.innerHTML=`<div class="page">

    </div>

    <div class="stats-grid mb-28">

      <div class="stat-card"><div class="stat-num" style="color:var(--terra)">${weekKm.toFixed(1)}</div><div class="stat-label">km This Week</div></div>
      <div class="stat-card"><div class="stat-num" style="color:var(--gold)">${goal-totalKm>0?(goal-totalKm).toFixed(0):'Done!'}</div><div class="stat-label">km to Training Goal</div></div>
      <div class="stat-card"><div class="stat-num">${pct}%</div><div class="stat-label">Training Progress</div></div>
    </div>

    <div class="card mb-20">
      <div class="card-title">Training Progress to ${goal}km goal</div>

      <div class="phase-bar">${phases.map((p,i)=>`<div class="phase-block ${i===currentPhase?'active':''}" style="background:${p.color}22;color:${p.color}">${p.label}</div>`).join('')}</div>
      <p class="text-sm text-muted mt-12">Currently in: <strong style="color:${phases[currentPhase].color}">${phases[currentPhase].label}</strong> phase</p>
    </div>
  </div>`;
}

  el.innerHTML=`<div class="page">

      <div class="stat-card"><div class="stat-num">${savPct}%</div><div class="stat-label">Savings Goal</div></div>
    </div>

    <div class="card mb-20">
      <div class="card-title">Savings Goal</div>
      <div class="flex justify-between text-sm mb-8"><span>$${(f.savingsCurrent||0).toLocaleString()}</span><span class="text-muted">of $${(f.savingsGoal||0).toLocaleString()}</span></div>
      <div class="progress-bar" style="height:10px"><div class="progress-fill" style="width:${Math.min(100,savPct)}%"></div></div>

        <div class="flex justify-between text-sm mb-4"><span class="font-semi">${d.name}</span><span class="text-muted">$${d.remaining.toLocaleString()} left (${pct}% paid)</span></div>

    </div>`:`<button class="btn btn-ghost btn-sm mb-20" onclick="addDebt()">+ Track a Debt</button>`}
  </div>`;
}

function getXPConfig(){ return Object.assign({}, _xpConfig); }

// Level thresholds
const LEVELS = [
  { level:1,  label:'Seedling',    xp:0,    color:'var(--text3)' },
  { level:2,  label:'Sprout',      xp:100,  color:'oklch(65% 0.12 150)' },
  { level:3,  label:'Grower',      xp:250,  color:'var(--sage)' },
  { level:4,  label:'Builder',     xp:500,  color:'oklch(62% 0.13 200)' },
  { level:5,  label:'Momentum',    xp:900,  color:'var(--gold)' },
  { level:6,  label:'Consistent',  xp:1500, color:'oklch(62% 0.14 60)' },
  { level:7,  label:'Committed',   xp:2400, color:'var(--terra)' },
  { level:8,  label:'Disciplined', xp:3600, color:'oklch(58% 0.16 300)' },
  { level:9,  label:'Elite',       xp:5000, color:'oklch(55% 0.18 260)' },
  { level:10, label:'Legendary',   xp:7000, color:'oklch(62% 0.20 40)' },
];

function getTotalXP(){ return DB.get('xp_total', 0); }
function getTodayXP(){ return DB.get('xp_today_' + today(), 0); }

function getLevelInfo(xp){
  let current = LEVELS[0];
  for(const l of LEVELS){ if(xp >= l.xp) current = l; else break; }
  const nextIdx = LEVELS.findIndex(l => l.level === current.level) + 1;
  const next = LEVELS[nextIdx] || null;
  const progress = next ? Math.round((xp - current.xp) / (next.xp - current.xp) * 100) : 100;
  return { current, next, progress, xp };
}

function awardXP(amount, reason){
  if(amount <= 0) return;
  const total = getTotalXP() + amount;
  const todayTotal = getTodayXP() + amount;
  const prevLevel = getLevelInfo(getTotalXP()).current.level;
  DB.set('xp_total', total);
  DB.set('xp_today_' + today(), todayTotal);

  // Log XP event
  const log = DB.get('xp_log', []);
  log.unshift({ date: today(), amount, reason, ts: Date.now() });
  DB.set('xp_log', log.slice(0, 200)); // keep last 200

  const newLevel = getLevelInfo(total).current.level;

  // Show toast
  showXPToast(amount, reason);

  // Level up?
  if(newLevel > prevLevel){
    const info = getLevelInfo(total);
    setTimeout(() => showLevelUp(info.current), 600);
  }

  checkAchievements();
}

function showXPToast(amount, reason){
  const el = document.createElement('div');
  el.style.cssText = `
    position:fixed; bottom:${window.innerWidth<769?'80px':'32px'};
    left:50%; transform:translateX(-50%) translateY(8px);
    background:var(--ink); color:white;
    padding:8px 18px; border-radius:100px;
    font-size:.8rem; font-weight:700;
    z-index:9997; pointer-events:none;
    display:flex; align-items:center; gap:8px;
    box-shadow: 0 4px 20px oklch(0% 0 0 / 0.3);
    opacity:0; transition: opacity .3s, transform .3s;
  `;
  el.innerHTML = `<span style="color:var(--gold)">+${amount} XP</span><span style="opacity:.7;font-weight:400">${reason}</span>`;
  document.body.appendChild(el);
  requestAnimationFrame(()=>{ el.style.opacity='1'; el.style.transform='translateX(-50%) translateY(0)'; });
  setTimeout(()=>{ el.style.opacity='0'; setTimeout(()=>el.remove(), 400); }, 2200);
}

function showLevelUp(levelInfo){
  const el = document.createElement('div');
  el.style.cssText = `
    position:fixed; inset:0; display:flex; align-items:center; justify-content:center;
    background:oklch(0% 0 0 / 0.6); z-index:9996; cursor:pointer;
    animation: fadeIn .3s ease;
  `;
  el.innerHTML = `
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:24px;padding:48px 56px;text-align:center;max-width:380px;animation:modalIn .4s cubic-bezier(0.16,1,0.3,1)">

function checkAchievements(){
  const earned = DB.get('achievements', {});
  let newOnes = [];
  ACHIEVEMENTS.forEach(a => {
    if(!earned[a.id] && a.check()){
      earned[a.id] = today();
      newOnes.push(a);
    }
  });
  if(newOnes.length){
    DB.set('achievements', earned);
    newOnes.forEach((a, i) => setTimeout(() => showAchievementToast(a), i * 2600));
  }
}

function showAchievementToast(a){
  const el = document.createElement('div');
  el.style.cssText = `
    position:fixed; bottom:${window.innerWidth<769?'80px':'32px'};
    right:24px; transform:translateX(20px);
    background:var(--surface); border:1px solid var(--border);
    padding:14px 18px; border-radius:14px;
    font-size:.835rem; z-index:9997; pointer-events:none;
    box-shadow:var(--shadow-lg); max-width:260px;
    opacity:0; transition: opacity .3s, transform .3s;
  `;
  el.innerHTML = `
    <div style="font-size:.65rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--gold);margin-bottom:4px">Achievement Unlocked</div>
    <div style="display:flex;align-items:center;gap:8px">
      <span style="font-size:1.4rem">${a.icon}</span>
      <div>
        <div style="font-weight:700">${a.label}</div>
        <div style="font-size:.75rem;color:var(--text3)">${a.desc}</div>
      </div>
    </div>`;
  document.body.appendChild(el);
  requestAnimationFrame(()=>{ el.style.opacity='1'; el.style.transform='translateX(0)'; });
  setTimeout(()=>{ el.style.opacity='0'; el.style.transform='translateX(20px)'; setTimeout(()=>el.remove(), 400); }, 3500);
}

const _origToggleTodayHabit = window.toggleTodayHabit;
window.toggleTodayHabit = function(id){
  const checks = DB.get('habit_checks_'+today(), {});
  const wasOff = !checks[id];
  _origToggleTodayHabit(id);
  if(wasOff){
    const cfg = getXPConfig();
    const habits = DB.get('habits',[]);
    const h = habits.find(x=>x.id===id);
    const streak = h ? (h.streak||0) : 0;
    const bonus = Math.min(streak, 7) * cfg.streakBonus;
    awardXP(cfg.habit + bonus, (h?h.name:'Habit') + (bonus>0?' (streak bonus +'+bonus+')':''));
  }
};

  const newLen = DB.get('focus_log',[]).length;
  if(newLen > _lastFocusLogLen){

    _lastFocusLogLen = newLen;

  }
  _lastFocusLogLen = newLen;
};

function toggleAIPanel(){
  aiPanelOpen = !aiPanelOpen;
  const existing = document.getElementById('ai-panel');
  if(existing){ existing.remove(); return; }
  
  const panel = document.createElement('div');
  panel.id = 'ai-panel';
  panel.className = 'ai-panel';
  panel.innerHTML = `
    <div class="ai-panel-header">
      <div class="ai-avatar">✦</div>
      <div>
        <div class="ai-panel-title">Your Coach</div>
        <div class="ai-panel-sub">AI-powered reflection & guidance</div>
      </div>
      <button class="btn-ghost" style="padding:4px;margin-left:auto" onclick="toggleAIPanel()">✕</button>
    </div>
    <div class="ai-messages" id="ai-msgs">
      ${aiMessages.map(m=>`<div class="ai-msg ${m.role==='user'?'user':'system'}">${m.text}</div>`).join('')}
    </div>
    <div class="ai-input-row">
      <textarea class="ai-input" id="ai-input" placeholder="Ask your coach something…" rows="1" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendAIMsg();}"></textarea>
      <button class="ai-send-btn" onclick="sendAIMsg()">${svgIcon('send')}</button>
    </div>
    <div style="padding:8px 14px;border-top:1px solid var(--border)">
      <div style="display:flex;gap:6px;flex-wrap:wrap">
        ${['Review my day','How am I doing?','Suggest a habit','Motivate me'].map(p=>`<button class="btn btn-secondary btn-sm" style="font-size:.7rem;padding:4px 10px" onclick="quickPrompt('${p}')">${p}</button>`).join('')}
      </div>
    </div>`;
  document.body.appendChild(panel);
  
  // Scroll to bottom
  const msgs = document.getElementById('ai-msgs');
  if(msgs) msgs.scrollTop = msgs.scrollHeight;
}

window.quickPrompt = function(p){ 
  const inp = document.getElementById('ai-input');
  if(inp){ inp.value = p; sendAIMsg(); }
};

window.sendAIMsg = async function(){
  const inp = document.getElementById('ai-input');
  if(!inp || !inp.value.trim()) return;
  const text = inp.value.trim();
  inp.value = '';
  
  aiMessages.push({role:'user', text});
  
  const msgs = document.getElementById('ai-msgs');
  if(msgs){
    msgs.innerHTML += `<div class="ai-msg user">${text.replace(/</g,'&lt;')}</div>`;
    msgs.innerHTML += `<div class="ai-msg system typing" id="ai-typing">Thinking…</div>`;
    msgs.scrollTop = msgs.scrollHeight;
  }
  
  // Build context for Claude
  const habits = DB.get('habits',[]);
  const checks = DB.get('habit_checks_'+today(),{});
  const doneHabits = habits.filter(h=>checks[h.id]).map(h=>h.name);
  const goals = DB.get('goals_2026',[]);
  const todayLog = DB.get('daylog_'+today(),{});
  const weekWorkouts = DB.get('workouts',[]).filter(w=>w.date>=today().slice(0,8)+'01').length;
  
  const contextPrompt = `You are a warm, encouraging personal coach inside "The Journal" life planner app.

User context:
- Name: ${getName()}
- Today: ${fmtDate(today())}
- Habits done today: ${doneHabits.join(', ')||'none yet'}
- Habits remaining: ${habits.filter(h=>!checks[h.id]).map(h=>h.name).join(', ')||'all done!'}
- Mood today: ${todayLog.mood||'not logged'}/10
- Energy: ${todayLog.energy||'not logged'}/10
- Goals: ${goals.map(g=>g.title+' ('+g.status+')').join(', ')||'none set'}
- Focus sessions today: ${DB.get('focus_log',[]).filter(s=>s.date===today()).length}

User message: "${text}"

Respond warmly and concisely (2-3 sentences). Be encouraging, practical and specific. Reference their actual data where relevant.`;

  try {
    const response = await window.claude.complete({
      messages: [{ role: 'user', content: contextPrompt }]
    });
    
    const typing = document.getElementById('ai-typing');
    if(typing){ typing.id=''; typing.classList.remove('typing'); typing.innerHTML = response.replace(/</g,'&lt;').replace(/\n/g,'<br>'); }
    
    aiMessages.push({role:'system', text:response});
    if(msgs) msgs.scrollTop = msgs.scrollHeight;
  } catch(e){
    const typing = document.getElementById('ai-typing');
    if(typing){ typing.id=''; typing.classList.remove('typing'); typing.textContent = 'Sorry, I couldn\'t connect right now. Try again in a moment.'; }
  }
};

/* ============================================================
   OBSIDIAN SYNC API
   ============================================================ */
const ObsidianAPI={
  cfg(){return DB.get('obsidian_cfg',{enabled:false,apiKey:'',port:27124});},
  saveCfg(c){DB.set('obsidian_cfg',c);},
  guard(){const c=this.cfg();if(!c.enabled||!c.apiKey){showToast('Set up Obsidian sync in Settings first');return false;}return true;},
  async req(method,path,body){
    const c=this.cfg();
    const res=await fetch(`https://localhost:${c.port}/vault/${path.replace(/^\/+/,'')}`,{method,headers:{'Authorization':'Bearer '+c.apiKey,...(body?{'Content-Type':'text/markdown'}:{})}, ...(body?{body}:{})});
    if(!res.ok)throw new Error('HTTP '+res.status);return res;
  },
  async testConn(){
    const c=this.cfg();if(!c.apiKey)return{ok:false,msg:'No API key set'};
    try{const res=await fetch(`https://localhost:${c.port}/`,{headers:{'Authorization':'Bearer '+c.apiKey}});return res.ok?{ok:true,msg:'Connected ✓'}:{ok:false,msg:'Error '+res.status};}
    catch(e){return{ok:false,msg:'Cannot reach Obsidian. Make sure it\'s open with Local REST API plugin running.'};}
  },
  async write(path,content){await this.req('PUT',path,content);},
  buildDailyMd(d){
    const log=DB.get('daylog_'+d,{mood:5,energy:5,sleep:{hours:7,quality:3},water:0,reflection:{}});
    const habits=DB.get('habits',[]).filter(h=>h.active!==false);
    const checks=DB.get('habit_checks_'+d,{});
    const grat=DB.get('gratitude_'+d,[' ',' ',' ']);
    const journals=DB.get('journal_entries',[]).filter(e=>e.date===d);
    let md=`---\ndate: ${d}\ntags: [daily-log, life-planner]\n---\n# Daily Log — ${fmtDate(d)}\n\n`;
    md+=`## Mood & Energy\n- Mood: ${log.mood}/10\n- Energy: ${log.energy}/10\n- Sleep: ${(log.sleep||{}).hours||0}h (quality ${(log.sleep||{}).quality||0}/5)\n- Water: ${log.water||0}/8 glasses\n\n`;
    if(habits.length){md+=`## Habits\n`;habits.forEach(h=>{md+=`- [${checks[h.id]?'x':' '}] ${h.name}\n`;});md+='\n';}
    const g=grat.filter(v=>v&&v.trim()&&v.trim()!==' ');
    if(g.length){md+=`## Gratitude\n`;g.forEach((v,i)=>{md+=`${i+1}. ${v}\n`;});md+='\n';}
    if(journals.length){md+=`## Journal Entries\n`;journals.forEach(j=>{md+=`### ${j.type||'Entry'}\n${j.text||''}\n\n`;});}
    return md;
  },
  async pushDaily(d){if(!this.guard())return false;const ds=d||today();try{await this.write('01 Journals/'+ds+'.md',this.buildDailyMd(ds));showToast('✓ Daily log → Obsidian');return true;}catch(e){showToast('Obsidian error: '+e.message);return false;}},
  async pushGoals(){if(!this.guard())return false;const goals=DB.get('goals_2026',[]);let md=`---\ntags: [goals, life-planner]\nlast-synced: ${today()}\n---\n# 2026 Goals\n\n`;goals.forEach(g=>{const done=(g.milestones||[]).filter(m=>m.done).length;const tot=(g.milestones||[]).length;const pct=tot?Math.round(done/tot*100):0;md+=`## ${g.title}\n**Status:** ${g.status||'On Track'} · **Progress:** ${pct}%\n`;if(g.why)md+=`**Why:** ${g.why}\n`;if(g.milestones&&g.milestones.length){md+='\n**Milestones:**\n';g.milestones.forEach(m=>{md+=`- [${m.done?'x':' '}] ${m.text}\n`;});}md+='\n';});try{await this.write('03 Projects/LIFE PLANNER/(C) Goals Sync.md',md);showToast('✓ Goals → Obsidian');return true;}catch(e){showToast('Obsidian error: '+e.message);return false;}},
  async pushAll(){if(!this.guard())return;showToast('Syncing to Obsidian…',3000);await Promise.allSettled([this.pushDaily(),this.pushGoals()]);setTimeout(()=>showToast('✓ Synced to PAPA BRAIN!'),3100);},
};

}
