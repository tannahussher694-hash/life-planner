<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#FFFFFF">
<meta name="apple-mobile-web-app-title" content="Life Planner">
<title>Life Planner</title>
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
:root{
--bg:#FFFFFF;--bg2:#F1F5F9;--card:rgba(37,99,235,0.04);--card-border:rgba(37,99,235,0.14);
--text:#1E293B;--text2:#64748B;--text3:#CBD5E1;
--navy:#1E3A8A;--sage:#2563EB;--gold:#60A5FA;--cream:#FFFFFF;--coral:#F97316;
--accent:#2563EB;--accent2:#1D4ED8;--danger:#EF4444;
--shadow:0 4px 24px rgba(0,0,0,0.08);--shadow-lg:0 8px 40px rgba(0,0,0,0.14);
--radius:16px;--radius-sm:10px;--radius-xs:6px;
--sidebar:260px;--bottombar:72px;
--font:'Inter',system-ui,-apple-system,sans-serif;
}
.dark{
--bg:#0F172A;--bg2:#1E293B;--card:rgba(37,99,235,0.08);--card-border:rgba(37,99,235,0.2);
--text:#F1F5F9;--text2:#94A3B8;--text3:#475569;
--shadow:0 4px 24px rgba(0,0,0,0.5);--shadow-lg:0 8px 40px rgba(0,0,0,0.7);
}
*{margin:0;padding:0;box-sizing:border-box;}
html{font-size:16px;}
body{font-family:var(--font);background:var(--bg);color:var(--text);line-height:1.6;min-height:100vh;transition:background .3s,color .3s;}
/* overflow-x on .app, NOT body — body overflow-x:hidden blocks iOS keyboard */
.app{overflow-x:hidden;}
::selection{background:var(--sage);color:#fff;}
::-webkit-scrollbar{width:6px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--text3);border-radius:3px;}

/* Layout */
.app{display:flex;min-height:100vh;}
.sidebar{position:fixed;left:0;top:0;bottom:0;width:var(--sidebar);background:var(--navy);color:#E2E8F0;padding:24px 0;display:flex;flex-direction:column;z-index:100;transition:transform .3s;}
.sidebar .logo{padding:0 24px;margin-bottom:32px;}
.sidebar .logo h1{font-size:1.25rem;font-weight:800;letter-spacing:-0.02em;color:#fff;}
.sidebar .logo p{font-size:.75rem;color:#64748B;margin-top:2px;}
.sidebar nav{flex:1;overflow-y:auto;}
.sidebar nav a{display:flex;align-items:center;gap:12px;padding:10px 24px;color:#94A3B8;text-decoration:none;font-size:.875rem;font-weight:500;transition:all .2s;border-left:3px solid transparent;}
.sidebar nav a:hover{color:#E2E8F0;background:rgba(255,255,255,0.05);}
.sidebar nav a.active{color:#fff;background:rgba(255,255,255,0.15);border-left-color:var(--gold);}
.sidebar nav a svg{width:20px;height:20px;flex-shrink:0;}
.main{margin-left:var(--sidebar);flex:1;padding:32px;max-width:1100px;min-height:100vh;}
.bottombar{display:none;position:fixed;bottom:0;left:0;right:0;height:var(--bottombar);background:var(--navy);z-index:100;padding:0 8px;overflow-x:auto;}
.bottombar-inner{display:flex;align-items:center;justify-content:space-around;height:100%;min-width:100%;}
.bottombar a{display:flex;flex-direction:column;align-items:center;gap:2px;color:#64748B;text-decoration:none;font-size:.6rem;font-weight:500;padding:8px 6px;transition:color .2s;white-space:nowrap;}
.bottombar a.active{color:var(--sage);}
.bottombar a svg{width:22px;height:22px;}

@media(max-width:768px){
.sidebar{transform:translateX(-100%);}
.main{margin-left:0;padding:20px 16px;padding-bottom:calc(var(--bottombar) + 68px);}
.bottombar{display:block;}
}

/* ===== Sidebar accordion groups ===== */
.nav-group{width:100%;}
.nav-group-btn{display:flex;align-items:center;gap:12px;padding:10px 24px;color:#94A3B8;font-size:.875rem;font-weight:500;background:none;border:none;border-left:3px solid transparent;width:100%;cursor:pointer;text-align:left;transition:all .2s;}
.nav-group-btn:hover{color:#E2E8F0;background:rgba(255,255,255,0.05);}
.nav-group-btn.active{color:#fff;background:rgba(255,255,255,0.12);border-left-color:var(--gold);}
.nav-group-btn svg:first-child{width:20px;height:20px;flex-shrink:0;}
.nav-group-btn .nav-label{flex:1;}
.nav-chevron{width:13px!important;height:13px!important;flex-shrink:0;transition:transform .25s;opacity:.5;}
.nav-group.open .nav-chevron{transform:rotate(90deg);opacity:1;}
.nav-subs{overflow:hidden;max-height:0;transition:max-height .3s ease;}
.nav-subs a{display:flex;align-items:center;gap:10px;padding:7px 24px 7px 48px;color:#64748B;text-decoration:none;font-size:.8rem;font-weight:500;border-left:3px solid transparent;transition:all .2s;}
.nav-subs a:hover{color:#CBD5E1;background:rgba(255,255,255,0.04);}
.nav-subs a.active{color:#fff;background:rgba(255,255,255,0.1);border-left-color:var(--gold);}
.nav-subs a svg{width:15px;height:15px;flex-shrink:0;}

/* ===== Mobile sub-nav strip ===== */
.sub-nav{display:none;position:fixed;bottom:var(--bottombar);left:0;right:0;height:52px;background:rgba(15,23,42,0.99);border-top:1px solid rgba(255,255,255,0.07);z-index:99;overflow-x:auto;-webkit-overflow-scrolling:touch;}
.sub-nav-inner{display:flex;align-items:center;height:100%;padding:0 4px;min-width:max-content;}
.sub-nav a{display:flex;flex-direction:column;align-items:center;gap:2px;color:#64748B;text-decoration:none;font-size:.55rem;font-weight:600;letter-spacing:.04em;text-transform:uppercase;padding:6px 14px;white-space:nowrap;transition:color .2s;}
.sub-nav a.active{color:var(--sage);}
.sub-nav a svg{width:16px;height:16px;}
@media(min-width:769px){.sub-nav{display:none!important;}}

/* Cards */
/* backdrop-filter removed from .card — iOS Safari bug: inputs inside backdrop-filter elements cannot be focused */
.card{background:var(--card);border:1px solid var(--card-border);border-radius:var(--radius);padding:24px;box-shadow:var(--shadow);transition:transform .2s,box-shadow .2s;}
.card:hover{box-shadow:var(--shadow-lg);}
.card-sm{padding:16px;border-radius:var(--radius-sm);}
.card-title{font-size:1rem;font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:8px;}

/* Grid */
.grid{display:grid;gap:20px;}
.grid-2{grid-template-columns:repeat(2,1fr);}
.grid-3{grid-template-columns:repeat(3,1fr);}
.grid-4{grid-template-columns:repeat(4,1fr);}
@media(max-width:768px){.grid-2,.grid-3,.grid-4{grid-template-columns:1fr;}}
@media(min-width:769px) and (max-width:1024px){.grid-3,.grid-4{grid-template-columns:repeat(2,1fr);}}

/* Typography */
.page-title{font-size:1.75rem;font-weight:800;letter-spacing:-0.03em;margin-bottom:4px;}
.page-sub{color:var(--text2);font-size:.9rem;margin-bottom:24px;}
.section-title{font-size:1.1rem;font-weight:700;margin:28px 0 12px;letter-spacing:-0.01em;}
.label{font-size:.75rem;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:0.04em;margin-bottom:6px;}

/* Inputs */
/* touch-action:manipulation → removes 300ms tap delay on iOS
   -webkit-user-select:text → overrides iOS PWA standalone implicit user-select:none
   -webkit-appearance:none → prevents iOS from overriding our styles */
input,textarea,select{font-family:var(--font);font-size:16px;padding:10px 14px;border:1.5px solid var(--card-border);border-radius:var(--radius-xs);background:var(--bg);color:var(--text);width:100%;transition:border-color .2s,box-shadow .2s;outline:none;touch-action:manipulation;-webkit-user-select:text;user-select:text;-webkit-appearance:none;}
@media(min-width:769px){input,textarea,select{font-size:.875rem;}}
input:focus,textarea:focus,select:focus{border-color:var(--sage);box-shadow:0 0 0 3px rgba(37,99,235,0.15);}
textarea{resize:vertical;min-height:80px;}
select{cursor:pointer;}

/* Buttons */
.btn{display:inline-flex;align-items:center;gap:8px;padding:10px 20px;border:none;border-radius:var(--radius-xs);font-family:var(--font);font-size:.875rem;font-weight:600;cursor:pointer;transition:all .2s;text-decoration:none;}
.btn-primary{background:var(--sage);color:#fff;}
.btn-primary:hover{background:#B8960C;transform:translateY(-1px);}
.btn-secondary{background:var(--bg2);color:var(--text);border:1.5px solid var(--card-border);}
.btn-secondary:hover{border-color:var(--sage);}
.btn-danger{background:var(--coral);color:#fff;}
.btn-danger:hover{background:#c4623f;}
.btn-sm{padding:6px 14px;font-size:.8rem;}
.btn-ghost{background:transparent;color:var(--text2);padding:6px 10px;}
.btn-ghost:hover{color:var(--text);background:var(--bg2);}

/* Tags */
.tag{display:inline-block;padding:3px 10px;border-radius:20px;font-size:.7rem;font-weight:600;}
.tag-sage{background:rgba(37,99,235,0.1);color:var(--sage);}
.tag-gold{background:rgba(96,165,250,0.12);color:var(--gold);}
.tag-coral{background:rgba(249,115,22,0.12);color:var(--coral);}
.tag-navy{background:rgba(37,99,235,0.07);color:var(--text2);}
.dark .tag-navy{background:rgba(37,99,235,0.1);color:var(--text2);}

/* Modal */
/* backdrop-filter removed from modal-overlay — same iOS input bug as .card */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.65);z-index:1000;align-items:center;justify-content:center;padding:20px;}
.modal-overlay.open{display:flex;}
.modal{background:var(--bg);border-radius:var(--radius);padding:28px;width:100%;max-width:520px;max-height:85vh;overflow-y:auto;box-shadow:var(--shadow-lg);animation:modalIn .25s ease;}
@keyframes modalIn{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
.modal h2{font-size:1.2rem;font-weight:700;margin-bottom:16px;}
.modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:20px;}

/* Misc */
.stat-num{font-size:1.75rem;font-weight:800;letter-spacing:-0.03em;line-height:1.1;}
.stat-label{font-size:.7rem;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.04em;margin-top:4px;}
.empty{text-align:center;color:var(--text3);padding:32px;font-size:.9rem;line-height:1.7;}
.progress-bar{height:8px;background:var(--bg2);border-radius:4px;overflow:hidden;}
.progress-fill{height:100%;border-radius:4px;transition:width .6s ease;background:linear-gradient(90deg,var(--sage),var(--gold));}
.streak-badge{display:inline-flex;align-items:center;gap:4px;background:linear-gradient(135deg,var(--sage),var(--gold));color:#fff;padding:3px 10px;border-radius:20px;font-size:.7rem;font-weight:700;}
.form-group{margin-bottom:16px;}
.form-group label{display:block;font-size:.8rem;font-weight:600;color:var(--text2);margin-bottom:4px;}
.form-row{display:flex;gap:12px;}
.form-row>*{flex:1;}
.check-btn{width:28px;height:28px;border-radius:50%;border:2px solid var(--text3);background:transparent;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.check-btn.checked{background:var(--sage);border-color:var(--sage);animation:pop .3s ease;}
.check-btn.checked::after{content:'✓';color:#fff;font-size:14px;font-weight:700;}
@keyframes pop{0%{transform:scale(1);}50%{transform:scale(1.25);}100%{transform:scale(1);}}
.water-glass{width:36px;height:44px;border:2px solid var(--text3);border-radius:0 0 8px 8px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden;}
.water-glass.filled{border-color:var(--sage);}
.water-glass .water-fill{position:absolute;bottom:0;left:0;right:0;background:rgba(37,99,235,0.35);transition:height .4s ease;}
.water-glass.filled .water-fill{height:100%;background:var(--sage);}
.stars{display:flex;gap:4px;}
.stars .star{cursor:pointer;font-size:1.25rem;color:var(--text3);transition:color .15s;}
.stars .star.active{color:var(--gold);}
.confetti{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9999;}
.hidden{display:none!important;}
.fade-in{opacity:1;}
.heatmap{display:grid;grid-template-columns:repeat(53,1fr);gap:2px;}
.heatmap-cell{width:100%;aspect-ratio:1;border-radius:2px;background:var(--bg2);}
.slider-container{position:relative;padding:4px 0;}
input[type=range]{-webkit-appearance:none;height:6px;border:none;border-radius:3px;background:var(--bg2);padding:0;}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:20px;height:20px;border-radius:50%;background:var(--sage);cursor:pointer;border:2px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,0.15);}
.tab-bar{display:flex;gap:4px;margin-bottom:16px;background:var(--bg2);padding:4px;border-radius:var(--radius-xs);}
.tab-bar button{flex:1;padding:8px 12px;border:none;background:transparent;border-radius:var(--radius-xs);font-family:var(--font);font-size:.8rem;font-weight:600;color:var(--text2);cursor:pointer;transition:all .2s;}
.tab-bar button.active{background:var(--card);color:var(--text);box-shadow:var(--shadow);}
.inline-flex{display:inline-flex;align-items:center;gap:6px;}
.gap-8{gap:8px;}.gap-12{gap:12px;}.gap-16{gap:16px;}.gap-20{gap:20px;}
.mb-8{margin-bottom:8px;}.mb-12{margin-bottom:12px;}.mb-16{margin-bottom:16px;}.mb-20{margin-bottom:20px;}.mb-24{margin-bottom:24px;}
.mt-8{margin-top:8px;}.mt-12{margin-top:12px;}.mt-16{margin-top:16px;}
.flex{display:flex;}.flex-wrap{flex-wrap:wrap;}.items-center{align-items:center;}.justify-between{justify-content:space-between;}
.w-full{width:100%;}.text-center{text-align:center;}.text-right{text-align:right;}
.text-sm{font-size:.8rem;}.text-xs{font-size:.7rem;}
.color-sage{color:var(--sage);}.color-gold{color:var(--gold);}.color-coral{color:var(--coral);}.color-text2{color:var(--text2);}
.font-bold{font-weight:700;}.font-semi{font-weight:600;}
.clickable{cursor:pointer;}.truncate{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.chart-container{position:relative;height:220px;width:100%;}
@media(max-width:500px){.form-row{flex-direction:column;}}
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:var(--sage);color:#fff;padding:10px 20px;border-radius:20px;font-size:.875rem;font-weight:600;z-index:9998;pointer-events:none;opacity:0;transition:opacity .4s;}
.sync-fab{position:fixed;right:20px;bottom:calc(var(--bottombar) + 16px);width:44px;height:44px;border-radius:50%;background:var(--navy);color:#fff;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:200;box-shadow:0 4px 16px rgba(0,0,0,0.25);transition:background .2s,transform .1s;font-size:1.1rem;line-height:1;}
.sync-fab:hover{background:var(--sage);}
.sync-fab:active{transform:scale(0.92);}
.sync-fab.spinning svg{animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
@media(min-width:769px){.sync-fab{bottom:20px;}}
.drop-target{border:2px dashed var(--sage)!important;background:rgba(37,99,235,0.06)!important;}
.callout-sage{background:rgba(37,99,235,0.07);border-left:3px solid var(--sage);border-radius:6px;padding:8px 12px;margin-bottom:8px;}
.callout-gold{background:rgba(96,165,250,0.1);border-left:3px solid var(--gold);border-radius:6px;padding:8px 12px;margin-bottom:8px;}
.callout-coral{background:rgba(224,120,86,0.12);border-left:3px solid var(--coral);border-radius:6px;padding:8px 12px;margin-bottom:8px;}
.log-date-nav{display:flex;align-items:center;gap:8px;margin-bottom:16px;flex-wrap:wrap;}
.grat-archive-date{font-size:.8rem;font-weight:700;color:var(--text2);margin:16px 0 6px;padding-bottom:4px;border-bottom:1px solid var(--card-border);}
.grat-item{display:flex;align-items:flex-start;gap:6px;padding:3px 0;font-size:.875rem;}
.save-log-bar{position:sticky;bottom:80px;z-index:50;display:flex;justify-content:flex-end;padding:8px 0;}
@media(min-width:769px){.save-log-bar{bottom:16px;}}
.goals-glance{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;}
@media(max-width:768px){.goals-glance{grid-template-columns:1fr;}}
.drag-handle{cursor:grab;opacity:0.4;font-size:1rem;flex-shrink:0;}
.drag-handle:active{cursor:grabbing;}

/* ===== COUNTDOWN CARDS ===== */
.countdown-card{background:linear-gradient(135deg,var(--navy),#1E3A5F);color:#E2E8F0;border:none;padding:20px 24px;border-radius:var(--radius);display:flex;align-items:center;justify-content:space-between;gap:16px;}
.countdown-num{font-size:2.5rem;font-weight:800;letter-spacing:-0.04em;line-height:1;color:#fff;}
.countdown-label{font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#94A3B8;margin-top:2px;}
.countdown-title{font-size:.95rem;font-weight:700;color:#E2E8F0;margin-bottom:2px;}
.countdown-date{font-size:.75rem;color:#64748B;}

/* ===== FOCUS TIMER ===== */
.focus-wrap{display:flex;flex-direction:column;align-items:center;gap:24px;padding:24px 0;}
.focus-ring{position:relative;width:220px;height:220px;}
.focus-ring svg{width:220px;height:220px;transform:rotate(-90deg);}
.focus-ring circle{fill:none;stroke-width:10;cx:110;cy:110;r:98;}
.focus-track{stroke:var(--bg2);}
.focus-progress{stroke:var(--sage);stroke-dasharray:616;stroke-dashoffset:0;transition:stroke-dashoffset 1s linear;stroke-linecap:round;}
.focus-time{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.focus-time span{font-size:2.8rem;font-weight:800;letter-spacing:-0.04em;line-height:1;}
.focus-time small{font-size:.7rem;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.06em;margin-top:4px;}
.focus-modes{display:flex;gap:8px;}
.focus-modes button{padding:6px 14px;border:1.5px solid var(--card-border);border-radius:20px;background:transparent;font-family:var(--font);font-size:.8rem;font-weight:600;color:var(--text2);cursor:pointer;transition:all .2s;}
.focus-modes button.active{background:var(--sage);color:#fff;border-color:var(--sage);}
.focus-log{max-height:200px;overflow-y:auto;}

/* ===== NORTHSTAR PIPELINE ===== */
.pipeline-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;}
@media(max-width:900px){.pipeline-grid{grid-template-columns:repeat(2,1fr);}}
@media(max-width:500px){.pipeline-grid{grid-template-columns:1fr;}}
.pipeline-col-header{font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;padding:6px 10px;border-radius:6px;margin-bottom:8px;text-align:center;}
.pipeline-card{background:var(--bg);border:1.5px solid var(--card-border);border-radius:var(--radius-sm);padding:10px 12px;margin-bottom:8px;cursor:pointer;transition:border-color .2s;}
.pipeline-card:hover{border-color:var(--sage);}
.ns-stat{display:flex;flex-direction:column;align-items:center;gap:2px;}
.revenue-bar{height:12px;background:var(--bg2);border-radius:6px;overflow:hidden;margin-top:4px;}
.revenue-fill{height:100%;border-radius:6px;background:linear-gradient(90deg,var(--sage),var(--gold));transition:width .6s ease;}

/* ===== SOBRIETY / CLEAN STREAK ===== */
.sober-counter{font-size:5rem;font-weight:800;line-height:1;letter-spacing:-0.04em;background:linear-gradient(135deg,var(--sage),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;text-align:center;}
.sober-unit{font-size:1rem;font-weight:700;color:var(--text2);text-align:center;margin-top:4px;text-transform:uppercase;letter-spacing:.06em;}
.milestone-badge{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;border-radius:20px;font-size:.75rem;font-weight:700;background:var(--bg2);color:var(--text2);}
.milestone-badge.achieved{background:linear-gradient(135deg,var(--sage),var(--gold));color:#fff;}

/* ===== RELATIONSHIPS ===== */
.rel-card{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;background:var(--card);border:1px solid var(--card-border);border-radius:var(--radius-sm);margin-bottom:8px;transition:border-color .2s;}
.rel-card:hover{border-color:var(--sage);}
.rel-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.rel-dot.green{background:#22C55E;}
.rel-dot.yellow{background:#EAB308;}
.rel-dot.red{background:var(--coral);}

/* ===== ULTRA TRAINING ===== */
.phase-bar{display:grid;grid-template-columns:repeat(4,1fr);gap:4px;margin:12px 0;}
.phase-block{padding:8px 4px;border-radius:6px;text-align:center;font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.04em;opacity:.4;transition:opacity .2s;}
.phase-block.active{opacity:1;}
.phase-base{background:rgba(37,99,235,0.15);color:var(--sage);}
.phase-build{background:rgba(96,165,250,0.15);color:var(--gold);}

// Find which top-level group owns a given section id
function findGroup(sectionId){
  for(const g of navGroups){
    if(g.id===sectionId)return g;
    if(g.sub&&g.sub.some(s=>s.id===sectionId))return g;
  }
  return null;
}

// Lazily create or update the mobile sub-nav strip
function updateSubNav(group){
  let sn=document.getElementById('subNav');
  if(!sn){
    sn=document.createElement('div');sn.id='subNav';sn.className='sub-nav';
    const bar=document.getElementById('bottombar');
    if(bar)bar.parentNode.insertBefore(sn,bar);
  }
  if(group&&group.sub){
    sn.style.display='block';
    sn.innerHTML=`<div class="sub-nav-inner">${group.sub.map(s=>`<a href="#" data-section="${s.id}" onclick="event.preventDefault();navigate('${s.id}')" class="${s.id===currentSection?'active':''}">${icons[s.icon]}<span>${s.label}</span></a>`).join('')}</div>`;
  }else{
    sn.style.display='none';
    sn.innerHTML='';
  }
}

/* ===== SUPABASE CONFIG ===== */
const SUPA_URL='https://glnspleesodpbbyyodyu.supabase.co';
const SUPA_KEY='sb_publishable_5xL4l_--zVlOnSKHgXTZog_3aW__5b6';
let _supa=null;
let _realtimeChannel=null;
function getSupa(){if(!_supa&&window.supabase)_supa=window.supabase.createClient(SUPA_URL,SUPA_KEY);return _supa;}

/* ===== DATA LAYER — in-memory cache + localStorage + Supabase ===== */
// Cache seeds instantly from localStorage so reads are always synchronous
const _cache={};
(function seedCache(){for(let i=0;i<localStorage.length;i++){const k=localStorage.key(i);if(k&&k.startsWith('lt_')){try{_cache[k.slice(3)]=JSON.parse(localStorage.getItem(k));}catch(e){}}}})();

const DB={
  // Reads are synchronous — from in-memory cache, no network wait
  get(k,def=null){return k in _cache?_cache[k]:def;},

  // Writes: update cache + localStorage immediately, then sync to Supabase async
  set(k,v){
    _cache[k]=v;
    try{localStorage.setItem('lt_'+k,JSON.stringify(v));}catch(e){}
    const sb=getSupa();
    if(sb)sb.from('user_data').upsert({key:k,value:v,updated_at:new Date().toISOString()})
      .then(({error})=>{if(error)console.warn('Supabase write:',error.message);});
  },

  del(k){
    delete _cache[k];
    localStorage.removeItem('lt_'+k);
    const sb=getSupa();
    if(sb)sb.from('user_data').delete().eq('key',k)
      .then(({error})=>{if(error)console.warn('Supabase delete:',error.message);});
  },

  keys(){return Object.keys(_cache);},

  exportAll(){const d={};Object.entries(_cache).forEach(([k,v])=>{d['lt_'+k]=JSON.stringify(v);});return d;},

  importAll(d){
    Object.entries(d).forEach(([k,v])=>{
      if(k.startsWith('lt_')){
        try{
          const key=k.slice(3),val=JSON.parse(v);
          _cache[key]=val;
          localStorage.setItem(k,v);
          const sb=getSupa();
          if(sb)sb.from('user_data').upsert({key,value:val,updated_at:new Date().toISOString()});
        }catch(e){}
      }
    });
  },

  clearSection(prefix){
    Object.keys(_cache).filter(k=>k.startsWith(prefix)).forEach(k=>{
      delete _cache[k];
      localStorage.removeItem('lt_'+k);
    });
    const sb=getSupa();
    if(sb)sb.from('user_data').delete().like('key',prefix+'%')
      .then(({error})=>{if(error)console.warn('Supabase clearSection:',error.message);});
  },

  // Pull all rows from Supabase on load — Supabase wins on conflict
  async loadFromCloud(){
    const sb=getSupa();if(!sb)return;
    const{data,error}=await sb.from('user_data').select('key,value');
    if(error){console.warn('Supabase load:',error.message);return;}
    if(!data||!data.length)return;
    let changed=false;
    data.forEach(({key,value})=>{
      if(JSON.stringify(_cache[key])!==JSON.stringify(value)){
        _cache[key]=value;
        localStorage.setItem('lt_'+key,JSON.stringify(value));
        changed=true;
      }
    });
    if(changed)navigate(currentSection);
  },

  // Listen for changes from other devices (phone ↔ laptop live sync)
  subscribeRealtime(){
    const sb=getSupa();if(!sb)return;
    // Clean up any existing channel before re-subscribing (handles reconnects)
    if(_realtimeChannel){try{sb.removeChannel(_realtimeChannel);}catch(e){}  _realtimeChannel=null;}
    _realtimeChannel=sb.channel('lt_sync')
      .on('postgres_changes',{event:'*',schema:'public',table:'user_data'},({eventType,new:n,old:o})=>{
        if(eventType==='DELETE'&&o){delete _cache[o.key];localStorage.removeItem('lt_'+o.key);}
        else if(n&&n.key){_cache[n.key]=n.value;localStorage.setItem('lt_'+n.key,JSON.stringify(n.value));}
        navigate(currentSection);
      })
      .subscribe();
  }
};

/* ===== OBSIDIAN SYNC ===== */
const ObsidianAPI={
  cfg(){return DB.get('obsidian_cfg',{enabled:false,apiKey:'',port:27124});},
  saveCfg(c){DB.set('obsidian_cfg',c);},
  guard(){const c=this.cfg();if(!c.enabled||!c.apiKey){showToast('Set up Obsidian sync in Settings first');return false;}return true;},
  async req(method,path,body){
    const c=this.cfg();
    const res=await fetch(`https://localhost:${c.port}/vault/${path.replace(/^\/+/,'')}`,{
      method,
      headers:{'Authorization':'Bearer '+c.apiKey,...(body?{'Content-Type':'text/markdown'}:{})},
      ...(body?{body}:{})
    });
    if(!res.ok)throw new Error('HTTP '+res.status);
    return res;
  },
  async testConn(){
    const c=this.cfg();
    if(!c.apiKey)return{ok:false,msg:'No API key set — paste it below first'};
    try{
      const res=await fetch(`https://localhost:${c.port}/`,{headers:{'Authorization':'Bearer '+c.apiKey}});
      return res.ok?{ok:true,msg:'Connected ✓ — Obsidian is live'}:{ok:false,msg:'Error '+res.status+' — check your API key'};
    }catch(e){return{ok:false,msg:'Cannot reach Obsidian. Make sure it\'s open with Local REST API plugin running, and you\'ve accepted the certificate at https://localhost:27124'};}
  },
  async write(path,content){await this.req('PUT',path,content);},

  /* ── BUILDERS ── */
  buildDailyMd(d){
    const log=DB.get('daylog_'+d,{mood:5,energy:5,sleep:{hours:7,quality:3},water:0,reflection:{}});
    const habits=DB.get('habits',[]).filter(h=>h.active!==false);
    const checks=DB.get('habit_checks_'+d,{});
    const grat=DB.get('gratitude_'+d,[' ',' ',' ']);
    const learned=DB.get('learned_'+d,'');
    const nextDay=(ds=>{const dt=new Date(ds+'T12:00:00');dt.setDate(dt.getDate()+1);return dt.toISOString().slice(0,10);})(d);
    const tomorrowInt=DB.get('intentions_'+nextDay,[' ',' ',' ']);
    const workouts=DB.get('workouts',[]).filter(w=>w.date===d);
    const journals=DB.get('journal_entries',[]).filter(e=>e.date===d);
    let md=`---\ndate: ${d}\ntags: [daily-log, life-planner]\n---\n# Daily Log — ${fmtDate(d)}\n\n`;
    md+=`## Mood & Energy\n- Mood: ${log.mood}/10\n- Energy: ${log.energy}/10\n- Sleep: ${(log.sleep||{}).hours||0}h (quality ${(log.sleep||{}).quality||0}/5)\n- Water: ${log.water||0}/8 glasses\n\n`;
    if(habits.length){md+=`## Habits\n`;habits.forEach(h=>{md+=`- [${checks[h.id]?'x':' '}] ${h.name}\n`;});md+='\n';}
    const g=grat.filter(v=>v&&v.trim()&&v.trim()!==' ');
    if(g.length){md+=`## Gratitude\n`;g.forEach((v,i)=>{md+=`${i+1}. ${v}\n`;});md+='\n';}
    if(learned&&learned.trim()){md+=`## Learned Today\n${learned}\n\n`;}
    const r=log.reflection||{};
    if(r.win||r.learned||r.tomorrow){
      md+=`## End-of-Day Reflection\n`;
      if(r.win)md+=`**Biggest Win:** ${r.win}\n\n`;
      if(r.learned)md+=`**Learned:** ${r.learned}\n\n`;
      if(r.tomorrow)md+=`**Tomorrow's Top 3:** ${r.tomorrow}\n\n`;
    }
    const tInt=tomorrowInt.filter(v=>v&&v.trim()&&v.trim()!==' ');
    if(tInt.length){md+=`## Tomorrow's Intentions\n`;tInt.forEach((v,i)=>{md+=`${i+1}. ${v}\n`;});md+='\n';}
    if(workouts.length){
      md+=`## Workouts\n`;
      workouts.forEach(w=>{
        md+=`- **${w.type}** · ${w.duration}min · Intensity ${w.intensity}/10${w.notes?' · '+w.notes:''}\n`;
        (w.exercises||[]).forEach(e=>{md+=`  - ${e.name}: ${e.sets}×${e.reps}${e.weight?' @ '+e.weight+'lbs':''}\n`;});
      });
      md+='\n';
    }
    if(journals.length){md+=`## Journal Entries\n`;journals.forEach(j=>{md+=`### ${j.type||'Entry'}\n${j.text||''}\n\n`;});}
    return md;
  },
  buildGoalsMd(){
    const goals=DB.get('goals_2026',[]);
    const vision=DB.get('vision_2026','');
    let md=`---\ntags: [goals, life-planner, 2026]\nlast-synced: ${today()}\n---\n# 2026 Goals\n\n`;
    if(vision)md+=`## Vision 2026\n${vision}\n\n`;
    const cats=[...new Set(goals.map(g=>g.category))];
    cats.forEach(cat=>{
      md+=`## ${cat}\n`;
      goals.filter(g=>g.category===cat).forEach(g=>{
        const done=(g.milestones||[]).filter(m=>m.done).length;
        const total=(g.milestones||[]).length;
        const pct=total?Math.round(done/total*100):0;
        md+=`### ${g.title}\n**Status:** ${g.status||'On Track'} · **Progress:** ${pct}%\n`;
        if(g.why)md+=`**Why:** ${g.why}\n`;
        if(g.targetDate)md+=`**Target:** ${g.targetDate}\n`;
        if(g.milestones&&g.milestones.length){md+='\n**Milestones:**\n';g.milestones.forEach(m=>{md+=`- [${m.done?'x':' '}] ${m.text}\n`;});}
        md+='\n';
      });
    });
    return md;
  },
  buildHabitsMd(){
    const habits=DB.get('habits',[]);
    let md=`---\ntags: [habits, life-planner]\nlast-synced: ${today()}\n---\n# Habits Tracker\n\n`;
    habits.forEach(h=>{
      md+=`## ${h.name}\n- Current streak: ${h.streak||0} days\n- Longest streak: ${h.longestStreak||0} days\n\n`;
      const recentDays=[];const d=new Date();
      for(let i=0;i<14;i++){const dk=new Date(d);dk.setDate(d.getDate()-i);const ds=dk.toISOString().slice(0,10);const checks=DB.get('habit_checks_'+ds,{});recentDays.push({date:ds,done:!!checks[h.id]});}
      md+=`**Last 14 days:**\n`;
      recentDays.reverse().forEach(day=>{md+=`- ${day.date}: ${day.done?'✓':'✗'}\n`;});
      md+='\n';
    });
    return md;
  },
  buildWorkoutsMd(){
    const workouts=DB.get('workouts',[]).slice().reverse();
    const metrics=DB.get('body_metrics',[]);
    let md=`---\ntags: [workouts, training, life-planner]\nlast-synced: ${today()}\n---\n# Workout Log\n\n`;

        md+=`## ${fmtDate(w.date)} — ${w.type}\n`;
        md+=`- Duration: ${w.duration} min\n- Intensity: ${w.intensity}/10\n`;

          md+=`\n**Exercises:**\n`;

  buildFinanceMd(){
    const f=DB.get('finance',{income:[],expenses:[],savingsGoal:0,savingsCurrent:0,netWorth:[],debts:[]});
    const thisMonth=new Date().toISOString().slice(0,7);
    const mIncome=f.income.filter(i=>i.month===thisMonth).reduce((a,i)=>a+i.amount,0);
    const mExpenses=f.expenses.filter(i=>i.month===thisMonth).reduce((a,i)=>a+i.amount,0);

    if(f.debts&&f.debts.length){
      md+=`## Debts\n`;

      md+='\n';

    if(f.income&&f.income.length){

function navigate(id){

  // — Sidebar: clear all active states —
  document.querySelectorAll('.sidebar .nav-group-btn,.sidebar nav a[data-section]').forEach(el=>el.classList.remove('active'));

  // Mark active sub-item link
  const activeLink=document.querySelector(`.sidebar nav a[data-section="${id}"]`);
  if(activeLink)activeLink.classList.add('active');

  // Auto-expand parent group + mark its button active
  if(group&&group.sub){
    const wrap=document.querySelector(`.nav-group[data-group="${group.id}"]`);
    const subs=document.getElementById(`group-subs-${group.id}`);
    const btn=wrap?wrap.querySelector('.nav-group-btn'):null;
    if(wrap&&subs&&!wrap.classList.contains('open')){
      wrap.classList.add('open');
      subs.style.maxHeight=subs.scrollHeight+'px';
    }
    if(btn)btn.classList.add('active');
  }

  // — Bottom bar: highlight the parent group icon —
  document.querySelectorAll('.bottombar a').forEach(a=>{
    a.classList.toggle('active', group?(a.dataset.group===group.id||a.dataset.section===id):false);
  });

  // — Mobile sub-nav strip —
  updateSubNav(group);

  // — Render page —
  const main=document.getElementById('mainContent');
  main.innerHTML='';
  main.className='main fade-in';
  try{
    const renderers={today:renderToday,dailylog:renderDailyLog,calendar:renderCalendar,workouts:renderWorkouts,goals:renderGoals,habits:renderHabits,journal:renderJournal,gratitude:renderGratitude,reading:renderReading,money:renderMoney,ultra:renderUltra,northstar:renderNorthstar,sobriety:renderSobriety,relationships:renderRelationships,focus:renderFocus,settings:renderSettings};

function fireConfetti(){
  const c=document.getElementById('confettiCanvas');c.classList.remove('hidden');
  const ctx=c.getContext('2d');c.width=window.innerWidth;c.height=window.innerHeight;
  const pieces=[];const colors=['#84A98C','#D4A373','#E07856','#6366F1','#EC4899','#0EA5E9'];
  for(let i=0;i<80;i++)pieces.push({x:Math.random()*c.width,y:Math.random()*c.height-c.height,w:Math.random()*8+4,h:Math.random()*6+3,color:colors[Math.floor(Math.random()*colors.length)],vx:(Math.random()-0.5)*3,vy:Math.random()*4+2,rot:Math.random()*360,vr:(Math.random()-0.5)*8});
  let frame=0;
  function draw(){ctx.clearRect(0,0,c.width,c.height);pieces.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.rot+=p.vr;p.vy+=0.05;ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.rot*Math.PI/180);ctx.fillStyle=p.color;ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);ctx.restore();});frame++;if(frame<120)requestAnimationFrame(draw);else{c.classList.add('hidden');ctx.clearRect(0,0,c.width,c.height);}}
  draw();
}

function getInsights(){
  const ins=[];
  const habitsData=DB.get('habits',[]);
  const workoutsData=DB.get('workouts',[]);
  const moods=DB.get('dailylog_moods',{});
  const now=new Date();const thisMonth=now.toISOString().slice(0,7);

  const monthWorkouts=workoutsData.filter(w=>w.date&&w.date.startsWith(thisMonth)).length;
  if(monthWorkouts>0)ins.push(`You've worked out ${monthWorkouts} day${monthWorkouts>1?'s':''} this month. Keep the momentum going!`);

  habitsData.forEach(h=>{if(h.streak>=3)ins.push(`You're on a ${h.streak}-day ${h.name} streak. Keep going!`);});

  const moodDates=Object.keys(moods);const workoutDates=new Set(workoutsData.map(w=>w.date));
  if(moodDates.length>=5){
    let exMood=0,exCount=0,noMood=0,noCount=0;
    moodDates.forEach(d=>{if(workoutDates.has(d)){exMood+=moods[d];exCount++;}else{noMood+=moods[d];noCount++;}});
    if(exCount>0&&noCount>0){const diff=Math.round(((exMood/exCount)/(noMood/noCount)-1)*100);if(diff>10)ins.push(`Your mood is ${diff}% higher on days you exercise.`);}
  }

  const goalsData=DB.get('goals_2026',[]);
  const atRisk=goalsData.filter(g=>g.status==='At Risk').length;
  if(atRisk>0)ins.push(`${atRisk} of your 2026 goals ${atRisk===1?'is':'are'} at risk. Time to review?`);

  if(ins.length===0)ins.push('Start tracking your habits and workouts to unlock personalized insights!');
  return ins;
}

window.toggleTodayHabit=function(id){
  const checks=DB.get('habit_checks_'+today(),{});checks[id]=!checks[id];DB.set('habit_checks_'+today(),checks);
  updateHabitStreaks();
  const allHabits=DB.get('habits',[]).filter(h=>h.active!==false);
  const allDone=allHabits.every(h=>checks[h.id]);
  if(allDone&&allHabits.length>0)fireConfetti();
  navigate('today');
};

function updateHabitStreaks(){
  const habits=DB.get('habits',[]);
  habits.forEach(h=>{
    let streak=0;const d=new Date();
    for(let i=0;i<365;i++){
      const dk=d.toISOString().slice(0,10);
      const checks=DB.get('habit_checks_'+dk,{});
      if(checks[h.id])streak++;else break;
      d.setDate(d.getDate()-1);
    }
    h.streak=streak;
    h.longestStreak=Math.max(h.longestStreak||0,streak);
  });
  DB.set('habits',habits);
}

let calYear,calMonth,calView='month';
function renderCalendar(el){
  const n=new Date();if(!calYear){calYear=n.getFullYear();calMonth=n.getMonth();}

  const dayNames=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const first=new Date(calYear,calMonth,1);const startDay=first.getDay();

  let calHTML='';
  if(calView==='month'){
    calHTML=`<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px;text-align:center;">
      ${dayNames.map(d=>`<div class="text-xs font-semi color-text2" style="padding:8px 0;">${d}</div>`).join('')}
      ${Array.from({length:startDay},()=>'<div></div>').join('')}
      ${Array.from({length:daysInMonth},(_,i)=>{
        const day=i+1;const ds=`${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
        const dayEvents=events.filter(e=>e.date===ds||isRecurring(e,ds));
        const dayWkts=DB.get('workouts',[]).filter(w=>w.date===ds);
        const isToday=ds===today();
        return`<div class="card-sm" style="padding:6px;min-height:56px;${isToday?'border:2px solid var(--sage);':''}" onclick="showDayEvents('${ds}')" ondragover="event.preventDefault()" ondrop="dropCalEvent(event,'${ds}')">

          ${dayEvents.slice(0,2).map(e=>`<div class="text-xs truncate" draggable="true" ondragstart="dragCalEvent(event,'${e.id}')" onclick="event.stopPropagation()" style="color:${catColors[e.category]||'var(--text2)'};margin-top:2px;cursor:grab;">${e.title}</div>`).join('')}

      <button class="btn btn-primary btn-sm" onclick="addEvent()">+ Event</button>
    </div>
  </div>
  ${calHTML}`;
}

function isRecurring(e,ds){
  if(!e.recurring||e.recurring==='none')return false;
  const ed=new Date(e.date+'T12:00:00');const dd=new Date(ds+'T12:00:00');
  if(dd<ed)return false;
  if(e.recurring==='daily')return true;
  if(e.recurring==='weekly')return ed.getDay()===dd.getDay();
  if(e.recurring==='monthly')return ed.getDate()===dd.getDate();
  return false;
}

function renderHabits(el){
  const habits=DB.get('habits',[]);
  updateHabitStreaks();
  const todayChecks=DB.get('habit_checks_'+today(),{});

  function buildHeatmap(hid){
    const cells=[];const d=new Date();d.setDate(d.getDate()-d.getDay());d.setDate(d.getDate()-52*7);
    for(let w=0;w<53;w++){for(let dd=0;dd<7;dd++){
      const ds=new Date(d);ds.setDate(d.getDate()+w*7+dd);
      const dk=ds.toISOString().slice(0,10);
      const checks=DB.get('habit_checks_'+dk,{});
      cells.push({date:dk,done:!!checks[hid]});
    }}
    return cells;
  }

  el.innerHTML=`
  <div class="flex items-center justify-between mb-16">
    <div><h1 class="page-title">Habits</h1><p class="page-sub">${habits.length} habits tracked</p></div>
    <div class="flex gap-8"><button class="btn btn-secondary btn-sm" onclick="ObsidianAPI.pushHabits()">🔗 Sync</button><button class="btn btn-primary btn-sm" onclick="addHabit()">+ New Habit</button></div>
  </div>

  ${habits.map(h=>{
    const cells=buildHeatmap(h.id);
    return`<div class="card mb-16">
      <div class="flex items-center justify-between mb-12">
        <div class="flex items-center gap-12">
          <button class="check-btn ${todayChecks[h.id]?'checked':''}" onclick="toggleHabitFromPage('${h.id}')"></button>
          <div>
            <span class="font-bold">${h.name}</span>
            <div class="flex gap-8 mt-4">
              <span class="streak-badge">🔥 ${h.streak||0} day${(h.streak||0)!==1?'s':''}</span>
              <span class="text-xs color-text2">Best: ${h.longestStreak||0}</span>
            </div>
          </div>
        </div>
        <button class="btn-ghost text-xs" onclick="deleteHabit('${h.id}')">✕</button>
      </div>
      <div class="heatmap">${cells.map(c=>`<div class="heatmap-cell" style="background:${c.done?'var(--sage)':'var(--bg2)'}" title="${c.date}"></div>`).join('')}</div>
    </div>`;}).join('')}

  ${habits.length===0?`
    <div class="card">
      <div class="card-title">Quick Start Habits</div>
      <p class="text-sm color-text2 mb-12">Tap any to add it instantly:</p>
      <div class="flex flex-wrap gap-8">${defaultHabits.map(h=>`<button class="btn btn-secondary btn-sm" onclick="quickAddHabit('${h}')">${h}</button>`).join('')}</div>
    </div>`:''}
  `;
}

window.toggleHabitFromPage=function(id){
  const checks=DB.get('habit_checks_'+today(),{});checks[id]=!checks[id];DB.set('habit_checks_'+today(),checks);
  updateHabitStreaks();
  const habits=DB.get('habits',[]).filter(h=>h.active!==false);
  if(habits.every(h=>checks[h.id])&&habits.length>0)fireConfetti();

  if(better)fullText+=`**🔧 Do Better:** ${better}\n`;

/* ===== MONEY ===== */
function renderMoney(el){
  const finance=DB.get('finance',{income:[],expenses:[],savingsGoal:0,savingsCurrent:0,netWorth:[],debts:[]});
  const thisMonth=new Date().toISOString().slice(0,7);
  const monthIncome=finance.income.filter(i=>i.month===thisMonth).reduce((a,i)=>a+i.amount,0);
  const monthExpenses=finance.expenses.filter(i=>i.month===thisMonth).reduce((a,i)=>a+i.amount,0);
  const savingsPct=finance.savingsGoal?Math.round(finance.savingsCurrent/finance.savingsGoal*100):0;

  // Calile shifts
  const shifts=DB.get('calile_shifts',[]);
  const CALILE_RATE=32;
  const thisMonthStr=new Date().toISOString().slice(0,7);
  const monthShiftIncome=shifts.filter(s=>s.date&&s.date.startsWith(thisMonthStr)).reduce((a,s)=>a+(s.hours*CALILE_RATE),0);
  const totalShiftHours=shifts.reduce((a,s)=>a+(s.hours||0),0);

  // Runway calculator
  const avgWeeklyExpenses=finance.expenses.length>0?(finance.expenses.reduce((a,i)=>a+i.amount,0)/Math.max(1,new Set(finance.expenses.map(i=>i.month)).size))/4.33:0;
  const runwayWeeks=avgWeeklyExpenses>0?Math.floor(finance.savingsCurrent/avgWeeklyExpenses):null;

  el.innerHTML=`
  <div class="flex items-center justify-between mb-4"><h1 class="page-title" style="margin-bottom:0">Money</h1><button class="btn btn-secondary btn-sm" onclick="ObsidianAPI.pushFinance()">🔗 Sync to Obsidian</button></div>
  <p class="page-sub">Lightweight financial tracker</p>

  ${runwayWeeks!==null?`<div class="card mb-16" style="border-left:3px solid ${runwayWeeks<4?'var(--coral)':runwayWeeks<8?'var(--gold)':'var(--sage)'};">
    <div class="flex items-center justify-between">
      <div><div class="text-xs font-semi color-text2 mb-4">💰 RUNWAY CALCULATOR</div><div style="font-size:1.8rem;font-weight:800;color:${runwayWeeks<4?'var(--coral)':runwayWeeks<8?'var(--gold)':'var(--sage)'}">${runwayWeeks} weeks</div><div class="text-xs color-text2">at current spend rate (~$${Math.round(avgWeeklyExpenses)}/wk)</div></div>
      <div style="text-align:right"><div class="text-xs color-text2 mb-4">savings</div><div class="font-bold">$${(finance.savingsCurrent||0).toLocaleString()}</div></div>
    </div>
  </div>`:''}

  <div class="card mb-16">
    <div class="flex items-center justify-between mb-12">
      <div class="card-title" style="margin-bottom:0">☕ The Calile Shifts</div>
      <button class="btn btn-primary btn-sm" onclick="addShift()">+ Log Shift</button>
    </div>
    <div class="grid grid-3 mb-12">
      <div class="text-center"><div class="font-bold color-sage">$${monthShiftIncome.toLocaleString()}</div><div class="text-xs color-text2">earned this month</div></div>
      <div class="text-center"><div class="font-bold color-gold">${shifts.filter(s=>s.date&&s.date.startsWith(thisMonthStr)).reduce((a,s)=>a+(s.hours||0),0).toFixed(1)}h</div><div class="text-xs color-text2">hours this month</div></div>
      <div class="text-center"><div class="font-bold">${totalShiftHours.toFixed(1)}h</div><div class="text-xs color-text2">total hours worked</div></div>
    </div>
    ${shifts.length?`<div style="max-height:180px;overflow-y:auto;">${shifts.slice().reverse().slice(0,8).map(s=>`<div class="flex items-center justify-between mb-6"><span class="text-sm">${shortDate(s.date)} · ${s.hours}h${s.notes?' — '+s.notes:''}</span><div class="flex items-center gap-8"><span class="font-semi color-sage text-sm">$${(s.hours*CALILE_RATE).toFixed(0)}</span><button class="btn-ghost text-xs" onclick="deleteShift('${s.id}')">✕</button></div></div>`).join('')}</div>`:'<div class="text-xs color-text2">No shifts logged yet — start from 28 April 2026.</div>'}
  </div>

  <div class="grid grid-3 mb-20">
    <div class="card card-sm text-center"><div class="stat-num color-sage">$${monthIncome.toLocaleString()}</div><div class="stat-label">Income This Month</div></div>
    <div class="card card-sm text-center"><div class="stat-num color-coral">$${monthExpenses.toLocaleString()}</div><div class="stat-label">Expenses This Month</div></div>
    <div class="card card-sm text-center"><div class="stat-num" style="color:${monthIncome-monthExpenses>=0?'var(--sage)':'var(--coral)'}">$${(monthIncome-monthExpenses).toLocaleString()}</div><div class="stat-label">Net This Month</div></div>
  </div>

  <div class="grid grid-2 mb-20">
    <div class="card">
      <div class="card-title flex justify-between">Income <button class="btn btn-secondary btn-sm" onclick="addFinanceEntry('income')">+</button></div>
      ${finance.income.filter(i=>i.month===thisMonth).map(i=>`<div class="flex items-center justify-between mb-4"><span class="text-sm">${i.label}</span><span class="font-semi color-sage">$${i.amount.toLocaleString()}</span></div>`).join('')||'<div class="text-xs color-text2">No income logged this month</div>'}
    </div>
    <div class="card">
      <div class="card-title flex justify-between">Expenses <button class="btn btn-secondary btn-sm" onclick="addFinanceEntry('expenses')">+</button></div>
      ${finance.expenses.filter(i=>i.month===thisMonth).map(i=>`<div class="flex items-center justify-between mb-4"><span class="text-sm">${i.label}</span><span class="font-semi color-coral">$${i.amount.toLocaleString()}</span></div>`).join('')||'<div class="text-xs color-text2">No expenses logged this month</div>'}
    </div>
  </div>

  <div class="grid grid-2 mb-20">
    <div class="card">
      <div class="card-title">Savings Goal</div>
      <div class="form-row mb-12">
        <div class="form-group"><label>Goal</label><input type="number" value="${finance.savingsGoal}" onchange="updateFinance('savingsGoal',+this.value)"></div>
        <div class="form-group"><label>Current</label><input type="number" value="${finance.savingsCurrent}" onchange="updateFinance('savingsCurrent',+this.value)"></div>
      </div>
      <div class="progress-bar mb-4"><div class="progress-fill" style="width:${Math.min(100,savingsPct)}%"></div></div>
      <div class="text-xs color-text2">${savingsPct}% of goal</div>
    </div>
    <div class="card">
      <div class="card-title flex justify-between">Net Worth <button class="btn btn-secondary btn-sm" onclick="addNetWorth()">+ Snapshot</button></div>
      ${finance.netWorth.length?`<div class="chart-container" style="height:150px;"><canvas id="nwChart"></canvas></div>`:'<div class="text-xs color-text2">Add monthly snapshots to track over time</div>'}
    </div>
  </div>

  <div class="card">
    <div class="card-title flex justify-between">Debts <button class="btn btn-secondary btn-sm" onclick="addDebt()">+</button></div>
    ${finance.debts.length?finance.debts.map(d=>{const pct=d.original?Math.round((1-d.remaining/d.original)*100):0;return`
      <div class="mb-12"><div class="flex justify-between mb-4"><span class="font-semi">${d.name}</span><span class="text-sm color-coral">$${d.remaining.toLocaleString()} left</span></div>
      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%;background:linear-gradient(90deg,var(--coral),var(--gold))"></div></div>
      <div class="text-xs color-text2 mt-4">${pct}% paid off of $${d.original.toLocaleString()}</div></div>`;}).join(''):'<div class="text-xs color-text2">No debts tracked — that\'s a great place to be!</div>'}
  </div>`;

  if(finance.netWorth.length){
    setTimeout(()=>{
      const c=document.getElementById('nwChart');
      if(c)chartInstances.nw=new Chart(c,{type:'line',data:{labels:finance.netWorth.map(n=>n.month),datasets:[{data:finance.netWorth.map(n=>n.amount),borderColor:'#84A98C',backgroundColor:'rgba(132,169,140,0.1)',tension:0.3,fill:true}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{grid:{color:'rgba(0,0,0,0.05)'}},x:{grid:{display:false}}}}});
    },50);
  }
}

window.exportData=function(){
  const d=DB.exportAll();
  const blob=new Blob([JSON.stringify(d,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download=`life-tracker-backup-${today()}.json`;a.click();URL.revokeObjectURL(a.href);
};

window.importData=function(input){
  const f=input.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=function(e){
    try{const d=JSON.parse(e.target.result);DB.importAll(d);alert('Data imported successfully!');navigate('today');}
    catch(err){alert('Invalid JSON file.');}
  };
  r.readAsText(f);
};

window.obsidianSave=function(){
  const cfg={
    enabled:document.getElementById('obsEnabled').checked,
    apiKey:document.getElementById('obsApiKey').value.trim(),
    port:+document.getElementById('obsPort').value||27124
  };
  ObsidianAPI.saveCfg(cfg);
  showToast('Obsidian config saved ✓');
  navigate('settings');
};

window.obsidianTest=async function(){
  const status=document.getElementById('obsStatus');
  if(status){status.textContent='Testing connection...';status.style.color='var(--text2)';}
  // Save current values first so testConn uses them
  const tmpCfg={
    enabled:document.getElementById('obsEnabled').checked,
    apiKey:document.getElementById('obsApiKey').value.trim(),
    port:+document.getElementById('obsPort').value||27124
  };
  ObsidianAPI.saveCfg(tmpCfg);
  const result=await ObsidianAPI.testConn();
  if(status){
    status.textContent=result.msg;
    status.style.color=result.ok?'var(--sage)':'var(--coral)';
  }
};

function renderSobriety(el){
  const data=DB.get('sobriety',{startDate:null,slips:[],substance:'Nicotine/Vaping',notes:''});
  const slips=data.slips||[];
  const lastSlip=slips.length?slips[slips.length-1].date:null;
  const streakStart=lastSlip||(data.startDate||today());
  const streakDays=Math.max(0,Math.floor((new Date()-new Date(streakStart+'T00:00:00'))/86400000));
  const totalDays=data.startDate?Math.max(0,Math.floor((new Date()-new Date(data.startDate+'T00:00:00'))/86400000)):0;
  const milestones=[{days:1,label:'1 day'},{days:3,label:'3 days'},{days:7,label:'1 week'},{days:14,label:'2 weeks'},{days:30,label:'1 month'},{days:60,label:'2 months'},{days:90,label:'3 months'},{days:180,label:'6 months'},{days:365,label:'1 year'}];

  el.innerHTML=`
  <div class="flex items-center justify-between mb-16">
    <div><h1 class="page-title">Clean Streak</h1><p class="page-sub">Tracking: ${data.substance}</p></div>
    <div class="flex gap-8">
      ${!data.startDate?`<button class="btn btn-primary" onclick="setSobrietyStart()">Start Tracking</button>`:`<button class="btn btn-secondary btn-sm" onclick="editSobrietySettings()">Settings</button><button class="btn btn-danger btn-sm" onclick="logSlip()">Log Slip</button>`}
    </div>
  </div>

  ${data.startDate?`
  <div class="card mb-20" style="text-align:center;padding:40px 24px;">
    <div class="sober-counter">${streakDays}</div>
    <div class="sober-unit">days clean</div>
    <div class="text-xs color-text2 mt-12">Since ${fmtDate(streakStart)} · ${slips.length} slip${slips.length!==1?'s':''} total</div>
    ${streakDays>=7?`<div class="streak-badge mt-16" style="margin:0 auto;width:fit-content;">🔥 On a roll</div>`:''}
  </div>

  <div class="grid grid-2 mb-20">
    <div class="card card-sm text-center"><div class="stat-num color-sage">${streakDays}</div><div class="stat-label">Current Streak</div></div>
    <div class="card card-sm text-center"><div class="stat-num color-gold">${totalDays}</div><div class="stat-label">Total Days Free</div></div>

  <div class="card mb-20">
    <div class="card-title">🏆 Milestones</div>
    <div class="flex flex-wrap gap-8">
      ${milestones.map(m=>`<span class="milestone-badge ${streakDays>=m.days?'achieved':''}">${streakDays>=m.days?'✓ ':''} ${m.label}</span>`).join('')}
    </div>
  </div>

  ${slips.length?`<div class="card mb-20">
    <div class="card-title">📋 Slip Log</div>
    ${slips.slice().reverse().map(s=>`<div class="flex items-center justify-between mb-8">

      <button class="btn-ghost text-xs" onclick="deleteSlip('${s.id}')">✕</button>
    </div>`).join('')}
  </div>`:''}

  <div class="card">
    <div class="card-title">📝 Notes / Triggers to Avoid</div>
    <textarea rows="3" placeholder="What triggers you? What helps you resist?" onchange="saveSobrietyNotes(this.value)">${(data.notes||'').replace(/</g,'&lt;')}</textarea>
  </div>
  `:`<div class="card text-center" style="padding:40px;">
    <div style="font-size:3rem;margin-bottom:16px;">🛡️</div>
    <h2 style="margin-bottom:8px;">Start Your Clean Streak</h2>
    <p class="text-sm color-text2 mb-20">Track how long you've been free from smoking and vaping. Every day counts.</p>
    <button class="btn btn-primary" onclick="setSobrietyStart()">Set Start Date</button>
  </div>`}
  `;
}

/* ===== RELATIONSHIPS ===== */
function renderRelationships(el){
  const people=DB.get('relationships',[]);
  const now=new Date();

  function daysSince(dateStr){
    if(!dateStr)return Infinity;
    return Math.floor((now-new Date(dateStr+'T12:00:00'))/86400000);
  }
  function dotColor(days){
    if(days===Infinity)return'red';
    if(days<=7)return'green';
    if(days<=21)return'yellow';
    return'red';
  }
  function dotLabel(days){
    if(days===Infinity)return'Never reached out';
    if(days===0)return'Today';
    if(days===1)return'Yesterday';
    if(days<=7)return`${days}d ago`;
    if(days<=30)return`${days}d ago`;
    return`${days}d ago — reach out!`;
  }

  const sorted=[...people].sort((a,b)=>daysSince(a.lastContact)-daysSince(b.lastContact)).reverse();

  el.innerHTML=`
  <div class="flex items-center justify-between mb-16">
    <div><h1 class="page-title">People</h1><p class="page-sub">Stay in touch with the ones who matter</p></div>
    <button class="btn btn-primary btn-sm" onclick="addPerson()">+ Add Person</button>
  </div>

  ${people.length===0?`<div class="card text-center" style="padding:40px;">
    <div style="font-size:3rem;margin-bottom:16px;">👥</div>
    <h2 style="margin-bottom:8px;">Add the people who matter</h2>
    <p class="text-sm color-text2 mb-20">Family, crew, friends — track when you last reached out so no one gets left behind.</p>
    <button class="btn btn-primary" onclick="addPerson()">Add First Person</button>
  </div>`:''}

  ${sorted.map(p=>{
    const days=daysSince(p.lastContact);
    const color=dotColor(days);
    return`<div class="rel-card">
      <div class="flex items-center gap-12">
        <div class="rel-dot ${color}"></div>
        <div>
          <div class="font-semi">${p.name}${p.relation?` <span class="text-xs color-text2">${p.relation}</span>`:''}</div>
          <div class="text-xs color-text2 mt-2">${dotLabel(days)}</div>
          ${p.notes?`<div class="text-xs color-text2 mt-2" style="font-style:italic;">${p.notes}</div>`:''}
        </div>
      </div>
      <div class="flex gap-8">
        <button class="btn btn-secondary btn-sm" onclick="contactedPerson('${p.id}')">✓ Reached Out</button>
        <button class="btn-ghost text-xs" onclick="editPerson('${p.id}')">Edit</button>
      </div>
    </div>`;
  }).join('')}
  `;
}

window.addPerson=function(){
  openModal(`<h2>Add Person</h2>
    <div class="form-group"><label>Name</label><input id="pName" placeholder="e.g. Mum, Zak, Jamie..."></div>
    <div class="form-row">
      <div class="form-group"><label>Relation</label><input id="pRelation" placeholder="e.g. Family, Friend, Crew"></div>
      <div class="form-group"><label>Last Contacted</label><input type="date" id="pLast" value="${today()}"></div>
    </div>
    <div class="form-group"><label>Notes</label><input id="pNotes" placeholder="Anything to remember about staying in touch..."></div>
    <div class="modal-actions"><button class="btn btn-secondary" onclick="closeModal()">Cancel</button><button class="btn btn-primary" onclick="savePerson()">Save</button></div>`);
};
window.savePerson=function(editId){
  const people=DB.get('relationships',[]);
  const data={name:document.getElementById('pName').value,relation:document.getElementById('pRelation').value,lastContact:document.getElementById('pLast').value,notes:document.getElementById('pNotes').value};
  if(!data.name)return;
  if(editId){const p=people.find(p=>p.id===editId);if(p)Object.assign(p,data);}
  else{people.push({id:Date.now().toString(36),...data});}
  DB.set('relationships',people);closeModal();navigate('relationships');
};
window.editPerson=function(id){
  const p=DB.get('relationships',[]).find(p=>p.id===id);if(!p)return;
  openModal(`<h2>Edit Person</h2>
    <div class="form-group"><label>Name</label><input id="pName" value="${(p.name||'').replace(/"/g,'&quot;')}"></div>
    <div class="form-row">
      <div class="form-group"><label>Relation</label><input id="pRelation" value="${(p.relation||'').replace(/"/g,'&quot;')}"></div>
      <div class="form-group"><label>Last Contacted</label><input type="date" id="pLast" value="${p.lastContact||today()}"></div>
    </div>
    <div class="form-group"><label>Notes</label><input id="pNotes" value="${(p.notes||'').replace(/"/g,'&quot;')}"></div>

      <button class="btn btn-danger btn-sm" onclick="deletePerson('${id}')">Delete</button>
      <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>

window.contactedPerson=function(id){
  const people=DB.get('relationships',[]);const p=people.find(p=>p.id===id);

window.deletePerson=function(id){DB.set('relationships',DB.get('relationships',[]).filter(p=>p.id!==id));closeModal();navigate('relationships');};

/* ===== FOCUS TIMER ===== */
let focusInterval=null;
let focusSecondsLeft=0;
let focusTotalSeconds=0;
let focusRunning=false;
let focusMode='work';

function renderFocus(el){
  const sessions=DB.get('focus_sessions',[]);
  const todaySessions=sessions.filter(s=>s.date===today());
  const todayMinutes=todaySessions.reduce((a,s)=>a+(s.duration||0),0);
  const task=DB.get('focus_task','');

  el.innerHTML=`
  <div class="flex items-center justify-between mb-16">
    <div><h1 class="page-title">Focus Timer</h1><p class="page-sub">${todayMinutes} deep work minutes today</p></div>
  </div>

  <div class="card mb-20">
    <div class="focus-wrap">
      <div class="focus-modes">
        <button class="active" id="fBtn25" onclick="setFocusMode(25,5,'fBtn25')">25 / 5</button>
        <button id="fBtn50" onclick="setFocusMode(50,10,'fBtn50')">50 / 10</button>
        <button id="fBtn90" onclick="setFocusMode(90,20,'fBtn90')">90 / 20</button>
      </div>

      <div class="focus-ring">
        <svg><circle class="focus-track" cx="110" cy="110" r="98"/><circle class="focus-progress" id="focusRing" cx="110" cy="110" r="98"/></svg>
        <div class="focus-time">
          <span id="focusDisplay">25:00</span>
          <small id="focusModeLabel">WORK</small>
        </div>
      </div>

      <div style="width:100%;max-width:320px;">
        <input id="focusTaskInput" placeholder="What are you working on?" style="text-align:center;border-radius:20px;" value="${task.replace(/"/g,'&quot;')}" onchange="DB.set('focus_task',this.value)">
      </div>

      <div class="flex gap-12">
        <button class="btn btn-primary" id="focusStartBtn" onclick="toggleFocus()">▶ Start</button>
        <button class="btn btn-secondary" onclick="resetFocus()">↺ Reset</button>
      </div>
    </div>
  </div>

  ${todaySessions.length?`<div class="card">
    <div class="card-title">Today's Sessions</div>
    <div class="focus-log">
      ${todaySessions.slice().reverse().map(s=>`<div class="flex items-center justify-between mb-8">
        <span class="text-sm">${s.task||'Deep Work'}</span>
        <span class="tag tag-sage">${s.duration} min</span>
      </div>`).join('')}
    </div>
    <div class="mt-12 text-sm color-sage font-bold">${todayMinutes} minutes total today</div>
  </div>`:''}
  `;

  // Init timer state
  if(focusSecondsLeft>0){
    updateFocusDisplay(focusSecondsLeft,focusTotalSeconds);
    document.getElementById('focusStartBtn').textContent=focusRunning?'⏸ Pause':'▶ Resume';
  }else{
    setFocusModeInit(25*60,'fBtn25');
  }
}

function setFocusModeInit(seconds,activeBtn){
  focusSecondsLeft=seconds;focusTotalSeconds=seconds;focusRunning=false;
  updateFocusDisplay(seconds,seconds);
  document.querySelectorAll('.focus-modes button').forEach(b=>b.classList.remove('active'));
  const btn=document.getElementById(activeBtn);if(btn)btn.classList.add('active');
  const sb=document.getElementById('focusStartBtn');if(sb)sb.textContent='▶ Start';
}

window.setFocusMode=function(work,rest,btnId){
  if(focusRunning)return;
  clearInterval(focusInterval);
  focusSecondsLeft=work*60;focusTotalSeconds=work*60;focusMode='work';
  window._focusWorkMin=work;window._focusRestMin=rest;
  updateFocusDisplay(focusSecondsLeft,focusTotalSeconds);
  document.querySelectorAll('.focus-modes button').forEach(b=>b.classList.remove('active'));
  const btn=document.getElementById(btnId);if(btn)btn.classList.add('active');
  const sb=document.getElementById('focusStartBtn');if(sb)sb.textContent='▶ Start';
  const ml=document.getElementById('focusModeLabel');if(ml)ml.textContent='WORK';
};

window.toggleFocus=function(){
  if(focusRunning){
    clearInterval(focusInterval);focusRunning=false;
    const sb=document.getElementById('focusStartBtn');if(sb)sb.textContent='▶ Resume';
  }else{
    focusRunning=true;
    const sb=document.getElementById('focusStartBtn');if(sb)sb.textContent='⏸ Pause';
    focusInterval=setInterval(()=>{
      focusSecondsLeft--;
      updateFocusDisplay(focusSecondsLeft,focusTotalSeconds);
      if(focusSecondsLeft<=0){
        clearInterval(focusInterval);focusRunning=false;
        if(focusMode==='work'){
          // Log session
          const task=DB.get('focus_task','');
          const sessions=DB.get('focus_sessions',[]);
          sessions.push({id:Date.now().toString(36),date:today(),duration:Math.round(focusTotalSeconds/60),task});
          DB.set('focus_sessions',sessions);
          showToast('✓ Session complete! Take a break.',3000);
          focusMode='rest';
          const restMin=window._focusRestMin||5;
          focusSecondsLeft=restMin*60;focusTotalSeconds=restMin*60;
          const ml=document.getElementById('focusModeLabel');if(ml)ml.textContent='REST';
          updateFocusDisplay(focusSecondsLeft,focusTotalSeconds);
          const sb=document.getElementById('focusStartBtn');if(sb)sb.textContent='▶ Start Break';
        }else{
          showToast('Break over. Ready to go again?',3000);
          focusMode='work';
          const workMin=window._focusWorkMin||25;
          focusSecondsLeft=workMin*60;focusTotalSeconds=workMin*60;
          const ml=document.getElementById('focusModeLabel');if(ml)ml.textContent='WORK';
          updateFocusDisplay(focusSecondsLeft,focusTotalSeconds);
          const sb=document.getElementById('focusStartBtn');if(sb)sb.textContent='▶ Start';
          navigate('focus');
        }
      }
    },1000);
  }
};

window.resetFocus=function(){
  clearInterval(focusInterval);focusRunning=false;
  const workMin=window._focusWorkMin||25;
  focusSecondsLeft=workMin*60;focusTotalSeconds=workMin*60;focusMode='work';
  updateFocusDisplay(focusSecondsLeft,focusTotalSeconds);
  const sb=document.getElementById('focusStartBtn');if(sb)sb.textContent='▶ Start';
  const ml=document.getElementById('focusModeLabel');if(ml)ml.textContent='WORK';
};

function updateFocusDisplay(left,total){
  const m=Math.floor(left/60);const s=left%60;
  const disp=document.getElementById('focusDisplay');
  if(disp)disp.textContent=`${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  const ring=document.getElementById('focusRing');
  if(ring){
    const circumference=2*Math.PI*98;
    const dashOffset=circumference*(1-(left/total));
    ring.style.strokeDasharray=circumference;
    ring.style.strokeDashoffset=dashOffset;
  }
}

/* ===== FORCE RESYNC ===== */
window.forceCacheReset=async function(){
  const fab=document.getElementById('syncFab');
  if(fab)fab.classList.add('spinning');
  showToast('Resyncing from cloud…',3500);

  // 1. Wipe all local lt_* keys from localStorage
  const keysToRemove=[];
  for(let i=0;i<localStorage.length;i++){const k=localStorage.key(i);if(k&&k.startsWith('lt_'))keysToRemove.push(k);}
  keysToRemove.forEach(k=>localStorage.removeItem(k));

  // 2. Wipe in-memory cache
  Object.keys(_cache).forEach(k=>delete _cache[k]);

  // 3. Pull everything fresh from Supabase — cloud data is untouched
  try{
    await DB.loadFromCloud();
    DB.subscribeRealtime();
    showToast('Synced ✓ — data refreshed from cloud',2500);
    DB.set('last_force_sync',new Date().toISOString());
  }catch(e){
    showToast('Sync failed — check your connection',3000);
    console.warn('forceCacheReset error:',e);
  }finally{
    if(fab)fab.classList.remove('spinning');
  }
};

/* ===== INIT ===== */
function init(){
  const theme=DB.get('theme','light');
  if(theme==='dark')document.documentElement.classList.add('dark');
  buildNav();
  navigate('today');
  // Pull latest data from Supabase, then subscribe for live cross-device updates
  DB.loadFromCloud().then(()=>DB.subscribeRealtime());
}

document.addEventListener('DOMContentLoaded',init);

// Re-sync when app comes back into focus (tab switch, phone unlock, alt-tab)
document.addEventListener('visibilitychange',()=>{
  if(document.visibilityState==='visible') DB.loadFromCloud();
});

// Re-sync + re-subscribe when network comes back online
window.addEventListener('online',()=>{
  DB.loadFromCloud().then(()=>DB.subscribeRealtime());
});

/* ===== SERVICE WORKER ===== */
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('/life-planner/sw.js')
      .then(reg=>{
        // When a new SW version is found, tell it to activate immediately
        reg.addEventListener('updatefound',()=>{
          const nw=reg.installing;
          nw.addEventListener('statechange',()=>{
            if(nw.state==='installed'&&navigator.serviceWorker.controller){
              nw.postMessage({type:'SKIP_WAITING'});
            }
          });
        });
        // Check for updates every time the page gains focus
        document.addEventListener('visibilitychange',()=>{
          if(document.visibilityState==='visible') reg.update();
        });
      })
      .catch(err=>console.warn('SW registration failed:',err));
    // When SW takes control (new version activated), reload once to run fresh code
    let _reloading=false;
    navigator.serviceWorker.addEventListener('controllerchange',()=>{
      if(!_reloading){_reloading=true;window.location.reload();}
    });
  });
}
</script>
